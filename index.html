<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجلس - دردشة اجتماعية</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --card: #1a1a1a;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --vip: #fbbf24;
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --border: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* شاشات المصادقة */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-card {
            background: var(--card);
            border-radius: 40px;
            padding: 35px 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .auth-card i {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .auth-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 15px;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        /* التطبيق الرئيسي */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
        }

        /* رأس التطبيق */
        .app-header {
            padding: 15px 20px;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-id {
            font-size: 12px;
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--text-secondary);
        }

        /* المحتوى الرئيسي - قابل للتمرير */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* شريط التنقل السفلي - 3 أزرار فقط */
        .bottom-nav {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* ========== الصفحة الرئيسية ========== */
        /* بطاقة المستخدم */
        .user-stats-card {
            background: linear-gradient(135deg, var(--card), var(--surface));
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .user-stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .user-avatar-large {
            font-size: 55px;
        }

        .user-stats-numbers {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .stat-number {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .user-level-badge {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* قسم الغرف */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .room-card {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .room-card:active { transform: scale(0.97); }

        .room-icon {
            font-size: 35px;
            margin-bottom: 10px;
        }

        .room-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .room-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .room-card.vip { border-color: var(--vip); background: rgba(251, 191, 36, 0.05); }
        .room-card.vip .room-name { color: var(--vip); }

        /* ========== صفحة الأصدقاء ========== */
        .add-friend-section {
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .add-friend-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-friend-input {
            flex: 1;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 14px;
        }

        .add-friend-btn {
            background: var(--primary);
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .friend-card {
            background: var(--card);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .friend-avatar {
            font-size: 40px;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 700;
            font-size: 15px;
        }

        .friend-status {
            font-size: 11px;
            color: var(--success);
        }

        .friend-id {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .gift-btn, .chat-btn {
            background: var(--surface);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            margin-left: 5px;
        }

        .requests-section {
            margin-top: 20px;
        }

        .request-card {
            background: var(--card);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .request-buttons {
            display: flex;
            gap: 8px;
        }

        .accept-btn {
            background: var(--success);
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .reject-btn {
            background: var(--danger);
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        /* ========== صفحة البروفايل ========== */
        .profile-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .xp-bar {
            background: var(--card);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            width: 0%;
            border-radius: 10px;
        }

        .badge-item {
            display: inline-block;
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 4px;
        }

        /* ========== شاشة الدردشة ========== */
        .chat-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
        }

        .chat-room-name {
            flex: 1;
            font-weight: 700;
            font-size: 18px;
        }

        .room-announcement {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 15px;
            padding: 12px;
            margin: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            border-right: 3px solid var(--primary);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-left {
            align-self: flex-start;
            background: var(--card);
            border-bottom-left-radius: 5px;
        }

        .message-right {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 5px;
        }

        .message-sender {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 9px;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 12px 15px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--card);
            border: none;
            border-radius: 25px;
            color: var(--text);
            font-size: 15px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        .gift-menu {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 2100;
        }

        .gift-option {
            background: var(--surface);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        /* نافذة إنشاء غرفة */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: var(--card);
            border-radius: 30px;
            padding: 25px;
            width: 85%;
            max-width: 320px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            margin: 15px 0;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 4000;
            animation: fadeUp 0.3s;
            font-size: 13px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1x9fJe6zPFo7yiK1kSRsoR89aSff5k",
            authDomain: "itchat-web-8c4ed.firebaseapp.com",
            databaseURL: "https://itchat-web-8c4ed-default-rtdb.firebaseio.com",
            projectId: "itchat-web-8c4ed",
            storageBucket: "itchat-web-8c4ed.firebasestorage.app",
            messagingSenderId: "787261764804",
            appId: "1:787261764804:web:7af9a924d03989b1dbc591"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentUserData = null;
        let currentChatRoom = null;
        let currentChatRoomName = null;
        let messagesListener = null;

        // دوال مساعدة
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function generateUserId() {
            return Math.floor(100000000 + Math.random() * 900000000).toString();
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
        }

        // ========== واجهات المصادقة ==========
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <i class="fas fa-comments"></i>
                        <h1>مجلس</h1>
                        <p style="color:#9ca3af; margin-bottom:25px;">دردشة اجتماعية</p>
                        <div id="loginForm">
                            <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني">
                            <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور">
                            <button onclick="handleLogin()" class="auth-btn">دخول</button>
                            <button onclick="showRegisterForm()" class="auth-btn" style="background:#1a1a1a;">إنشاء حساب</button>
                        </div>
                        <div id="registerForm" style="display:none;">
                            <input type="email" id="regEmail" class="auth-input" placeholder="البريد الإلكتروني">
                            <input type="password" id="regPassword" class="auth-input" placeholder="كلمة المرور">
                            <input type="password" id="regConfirm" class="auth-input" placeholder="تأكيد كلمة المرور">
                            <button onclick="handleRegister()" class="auth-btn">إنشاء حساب</button>
                            <button onclick="showLoginForm()" class="auth-btn" style="background:#1a1a1a;">عودة</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if (!email || !pwd) return showToast('املأ جميع الحقول');
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
            } catch(e) { showToast('بريد أو كلمة مرور غير صحيحة'); }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!email || !pwd) return showToast('املأ جميع الحقول');
            if (pwd !== confirm) return showToast('كلمة المرور غير متطابقة');
            if (pwd.length < 6) return showToast('كلمة المرور 6 أحرف على الأقل');
            try {
                await auth.createUserWithEmailAndPassword(email, pwd);
            } catch(e) { showToast('البريد الإلكتروني مستخدم'); }
        };

        window.showRegisterForm = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        window.showLoginForm = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };

        // ========== إكمال الملف الشخصي ==========
        function renderCompleteProfile() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <i class="fas fa-user-astronaut"></i>
                        <h1>مرحباً بك!</h1>
                        <p style="color:#9ca3af; margin-bottom:20px;">أكمل بياناتك</p>
                        <div style="display:flex; justify-content:center; gap:25px; margin-bottom:20px;">
                            <div onclick="selectGender('male')" id="maleBox" style="padding:10px 20px; border-radius:20px; cursor:pointer; border:2px solid transparent;">
                                <i class="fas fa-user" style="font-size:30px;"></i><div>ذكر</div>
                            </div>
                            <div onclick="selectGender('female')" id="femaleBox" style="padding:10px 20px; border-radius:20px; cursor:pointer; border:2px solid transparent;">
                                <i class="fas fa-user" style="font-size:30px;"></i><div>أنثى</div>
                            </div>
                        </div>
                        <input type="text" id="username" class="auth-input" placeholder="اسم المستخدم">
                        <button onclick="completeProfile()" class="auth-btn">ابدأ</button>
                    </div>
                </div>
            `;
        }

        let selectedGender = null;
        window.selectGender = (g) => {
            selectedGender = g;
            document.getElementById('maleBox').style.borderColor = g === 'male' ? '#6366f1' : 'transparent';
            document.getElementById('femaleBox').style.borderColor = g === 'female' ? '#6366f1' : 'transparent';
        };

        window.completeProfile = async () => {
            const username = document.getElementById('username').value.trim();
            if (!selectedGender) return showToast('اختر الجنس');
            if (!username) return showToast('أدخل اسم المستخدم');
            if (username.length < 3) return showToast('اسم المستخدم 3 أحرف على الأقل');
            
            const avatar = selectedGender === 'male' ? '👨' : '👩';
            const userId = generateUserId();
            await db.ref(`users/${currentUser.uid}`).set({
                uid: currentUser.uid, username, avatar, gender: selectedGender,
                userId: userId, level: 1, xp: 0, coins: 100, wins: 0,
                online: true, friends: {}, requests: {}, badges: ['🆕 عضو جديد'],
                profileCompleted: true, bio: 'مرحباً!', createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            currentUserData = (await db.ref(`users/${currentUser.uid}`).once('value')).val();
            renderMainApp();
        };

        // ========== التطبيق الرئيسي ==========
        function renderMainApp() {
            document.getElementById('app').innerHTML = `
                <div class="app-container">
                    <div class="app-header">
                        <div class="header-logo"><i class="fas fa-crown" style="color:#f59e0b;"></i> مجلس</div>
                        <div class="header-id">🆔 ${currentUserData.userId}</div>
                    </div>
                    <div class="main-content" id="mainContent"></div>
                    <div class="bottom-nav">
                        <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>الرئيسية</span></button>
                        <button class="nav-item" data-page="friends"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></button>
                        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>البروفايل</span></button>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const page = btn.dataset.page;
                    if (page === 'home') renderHomePage();
                    else if (page === 'friends') renderFriendsPage();
                    else renderProfilePage();
                });
            });
            renderHomePage();
        }

        // ========== الصفحة الرئيسية ==========
        async function renderHomePage() {
            const container = document.getElementById('mainContent');
            const onlineSnap = await db.ref('users').once('value');
            const onlineCount = Object.values(onlineSnap.val() || {}).filter(u => u.online).length;
            
            container.innerHTML = `
                <!-- بطاقة المستخدم -->
                <div class="user-stats-card">
                    <div class="user-stats-header">
                        <div class="user-avatar-large">${currentUserData.avatar}</div>
                        <div class="user-level-badge">مستوى ${currentUserData.level}</div>
                    </div>
                    <div style="font-weight:700; font-size:18px;">${currentUserData.username}</div>
                    <div class="user-stats-numbers">
                        <div class="stat-number"><div class="stat-value">${currentUserData.coins || 0}</div><div class="stat-label">💎 عملة</div></div>
                        <div class="stat-number"><div class="stat-value">${currentUserData.wins || 0}</div><div class="stat-label">🏆 فوز</div></div>
                        <div class="stat-number"><div class="stat-value">${onlineCount}</div><div class="stat-label">🟢 متصل</div></div>
                    </div>
                </div>
                
                <!-- الغرفة الرئيسية -->
                <div class="section-title">🎯 الغرفة الرئيسية</div>
                <div class="room-card" style="background:linear-gradient(135deg, var(--primary), var(--primary-dark)); margin-bottom:20px;" onclick="openChatRoom('public', 'الغرفة الرئيسية')">
                    <div class="room-icon" style="font-size:45px;">🌍</div>
                    <div class="room-name" style="font-size:18px;">الغرفة الرئيسية</div>
                    <div class="room-meta">دردشة عامة مفتوحة للجميع</div>
                </div>
                
                <!-- الغرف الخاصة -->
                <div class="section-title">🏠 غرف خاصة</div>
                <div class="rooms-grid">
                    <div class="room-card vip" onclick="openChatRoom('vip_room', 'VIP Lounge')">
                        <div class="room-icon">👑</div>
                        <div class="room-name">VIP Lounge</div>
                        <div class="room-meta">غرفة كبار الشخصيات</div>
                    </div>
                    <div class="room-card" onclick="openChatRoom('council_room', 'المجلس')">
                        <div class="room-icon">🏛️</div>
                        <div class="room-name">المجلس</div>
                        <div class="room-meta">نقاشات جادة</div>
                    </div>
                    <div class="room-card" onclick="openChatRoom('1v1_room', '1 ضد 1')">
                        <div class="room-icon">⚔️</div>
                        <div class="room-name">1 ضد 1</div>
                        <div class="room-meta">تحدي ثنائي</div>
                    </div>
                    <div class="room-card" onclick="openChatRoom('battle_room', 'المعركة')">
                        <div class="room-icon">⚔️</div>
                        <div class="room-name">المعركة</div>
                        <div class="room-meta">منافسة حماسية</div>
                    </div>
                </div>
                
                <!-- الأحداث -->
                <div class="section-title">📢 الأحداث</div>
                <div class="room-card" style="background:rgba(99,102,241,0.1);" onclick="openChatRoom('events_room', 'الفعاليات')">
                    <div class="room-icon">🎉</div>
                    <div class="room-name">مسابقة الليلة</div>
                    <div class="room-meta">الجائزة 500 عملة</div>
                </div>
                
                <!-- غرفتي (التي أنشأتها) -->
                <div class="section-title">📁 غرفتي</div>
                <div id="myRoomsList"></div>
            `;
            
            // تحميل غرف المستخدم
            const roomsSnap = await db.ref('rooms').once('value');
            const myRooms = [];
            for (const [id, room] of Object.entries(roomsSnap.val() || {})) {
                if (room.ownerId === currentUser.uid) {
                    myRooms.push({id, ...room});
                }
            }
            
            const myRoomsContainer = document.getElementById('myRoomsList');
            if (myRooms.length === 0) {
                myRoomsContainer.innerHTML = `
                    <div class="empty-state">ليس لديك غرف خاصة</div>
                    <button onclick="showCreateRoomModal()" style="width:100%; padding:12px; background:var(--card); border:none; border-radius:25px; color:var(--primary); margin-top:10px;">+ إنشاء غرفة جديدة</button>
                `;
            } else {
                myRoomsContainer.innerHTML = myRooms.map(room => `
                    <div class="room-card" style="margin-bottom:10px;" onclick="openChatRoom('${room.id}', '${room.name}')">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="room-icon">🏠</div>
                            <div><div class="room-name">${room.name}</div><div class="room-meta">👑 مالك</div></div>
                        </div>
                    </div>
                `).join('') + `<button onclick="showCreateRoomModal()" style="width:100%; padding:12px; background:var(--card); border:none; border-radius:25px; color:var(--primary); margin-top:10px;">+ إنشاء غرفة جديدة</button>`;
            }
        }

        // ========== صفحة الأصدقاء ==========
        async function renderFriendsPage() {
            const container = document.getElementById('mainContent');
            const friendsSnap = await db.ref(`users/${currentUser.uid}/friends`).once('value');
            const friends = friendsSnap.val() || {};
            const requestsSnap = await db.ref(`users/${currentUser.uid}/requests`).once('value');
            const requests = requestsSnap.val() || {};
            
            container.innerHTML = `
                <!-- إضافة صديق -->
                <div class="add-friend-section">
                    <div style="font-weight:700; margin-bottom:10px;"><i class="fas fa-user-plus"></i> إضافة صديق</div>
                    <div class="add-friend-input-group">
                        <input type="text" id="friendIdInput" class="add-friend-input" placeholder="أدخل ID المستخدم">
                        <button class="add-friend-btn" onclick="addFriendById()">إضافة</button>
                    </div>
                </div>
                
                <!-- طلبات الصداقة -->
                <div class="requests-section" id="requestsSection"></div>
                
                <!-- قائمة الأصدقاء -->
                <div class="section-title">👥 أصدقائي (${Object.keys(friends).length})</div>
                <div class="friends-list" id="friendsList"></div>
            `;
            
            // عرض الطلبات
            const requestsSection = document.getElementById('requestsSection');
            if (Object.keys(requests).length > 0) {
                requestsSection.innerHTML = `<div class="section-title">📨 طلبات الصداقة</div>`;
                for (const [uid, req] of Object.entries(requests)) {
                    const userSnap = await db.ref(`users/${uid}`).once('value');
                    const user = userSnap.val();
                    if (user) {
                        requestsSection.innerHTML += `
                            <div class="request-card">
                                <div class="friend-avatar">${user.avatar}</div>
                                <div class="friend-info">
                                    <div class="friend-name">${user.username}</div>
                                    <div class="friend-id">🆔 ${user.userId}</div>
                                </div>
                                <div class="request-buttons">
                                    <button class="accept-btn" onclick="acceptFriendRequest('${uid}')">قبول</button>
                                    <button class="reject-btn" onclick="rejectFriendRequest('${uid}')">رفض</button>
                                </div>
                            </div>
                        `;
                    }
                }
            } else {
                requestsSection.innerHTML = '';
            }
            
            // عرض الأصدقاء
            const friendsList = document.getElementById('friendsList');
            if (Object.keys(friends).length === 0) {
                friendsList.innerHTML = '<div class="empty-state">لا يوجد أصدقاء بعد</div>';
            } else {
                for (const [fid] of Object.entries(friends)) {
                    const userSnap = await db.ref(`users/${fid}`).once('value');
                    const user = userSnap.val();
                    if (user) {
                        friendsList.innerHTML += `
                            <div class="friend-card">
                                <div class="friend-avatar">${user.avatar}</div>
                                <div class="friend-info">
                                    <div class="friend-name">${user.username}</div>
                                    <div class="friend-status">${user.online ? '🟢 متصل الآن' : '⚫ غير متصل'}</div>
                                    <div class="friend-id">🆔 ${user.userId}</div>
                                </div>
                                <button class="gift-btn" onclick="sendGift('${fid}')">🎁 هدية</button>
                                <button class="chat-btn" onclick="openChatRoom('private_${fid}', '${user.username}')">💬</button>
                            </div>
                        `;
                    }
                }
            }
        }

        window.addFriendById = async () => {
            const friendId = document.getElementById('friendIdInput').value.trim();
            if (!friendId) return showToast('أدخل ID المستخدم');
            
            const usersSnap = await db.ref('users').once('value');
            let foundUid = null;
            for (const [uid, user] of Object.entries(usersSnap.val() || {})) {
                if (user.userId === friendId && uid !== currentUser.uid) {
                    foundUid = uid;
                    break;
                }
            }
            if (!foundUid) return showToast('لا يوجد مستخدم بهذا ID');
            
            // التحقق من الصداقة الموجودة
            const existingFriend = await db.ref(`users/${currentUser.uid}/friends/${foundUid}`).once('value');
            if (existingFriend.exists()) return showToast('هذا المستخدم صديقك بالفعل');
            
            await db.ref(`users/${foundUid}/requests/${currentUser.uid}`).set({
                fromUserId: currentUser.uid,
                fromUsername: currentUserData.username,
                fromAvatar: currentUserData.avatar,
                fromId: currentUserData.userId,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            showToast('تم إرسال طلب الصداقة');
            document.getElementById('friendIdInput').value = '';
        };

        window.acceptFriendRequest = async (fromUid) => {
            const userSnap = await db.ref(`users/${fromUid}`).once('value');
            const user = userSnap.val();
            
            await db.ref(`users/${currentUser.uid}/friends/${fromUid}`).set({
                userId: fromUid, username: user.username, avatar: user.avatar,
                addedAt: firebase.database.ServerValue.TIMESTAMP
            });
            await db.ref(`users/${fromUid}/friends/${currentUser.uid}`).set({
                userId: currentUser.uid, username: currentUserData.username, avatar: currentUserData.avatar,
                addedAt: firebase.database.ServerValue.TIMESTAMP
            });
            await db.ref(`users/${currentUser.uid}/requests/${fromUid}`).remove();
            showToast('تم قبول طلب الصداقة');
            renderFriendsPage();
        };

        window.rejectFriendRequest = async (fromUid) => {
            await db.ref(`users/${currentUser.uid}/requests/${fromUid}`).remove();
            showToast('تم رفض الطلب');
            renderFriendsPage();
        };

        window.sendGift = async (toUid) => {
            if (currentUserData.coins < 10) return showToast('لا يوجد عملات كافية');
            await db.ref(`users/${currentUser.uid}`).update({ coins: currentUserData.coins - 10 });
            const toUserSnap = await db.ref(`users/${toUid}`).once('value');
            const toUser = toUserSnap.val();
            await db.ref(`users/${toUid}`).update({ coins: (toUser.coins || 0) + 10 });
            currentUserData.coins -= 10;
            showToast('🎁 تم إرسال الهدية!');
        };

        // ========== صفحة البروفايل ==========
        async function renderProfilePage() {
            const friendsCount = Object.keys(currentUserData.friends || {}).length;
            const xpPercent = (currentUserData.xp % 1000) / 10;
            
            document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center;">
                    <div style="font-size:80px;">${currentUserData.avatar}</div>
                    <div style="font-size:22px; font-weight:700;">${currentUserData.username}</div>
                    <div style="color:#9ca3af; font-size:13px;">🆔 ${currentUserData.userId}</div>
                </div>
                
                <div class="profile-stats-grid">
                    <div class="room-card" style="text-align:center;"><div style="font-size:20px; font-weight:700; color:#6366f1;">${currentUserData.level}</div><div>المستوى</div></div>
                    <div class="room-card" style="text-align:center;"><div style="font-size:20px; font-weight:700; color:#6366f1;">${currentUserData.xp || 0}</div><div>XP</div></div>
                    <div class="room-card" style="text-align:center;"><div style="font-size:20px; font-weight:700; color:#6366f1;">${friendsCount}</div><div>أصدقاء</div></div>
                </div>
                
                <div class="xp-bar"><div class="xp-fill" style="width:${xpPercent}%;"></div></div>
                
                <div style="margin:15px 0;">
                    ${currentUserData.badges.map(b => `<span class="badge-item"><i class="fas fa-medal" style="color:#f59e0b;"></i> ${b}</span>`).join('')}
                </div>
                
                <div class="room-card" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span><i class="fas fa-venus-mars"></i> ${currentUserData.gender === 'male' ? 'ذكر' : 'أنثى'}</span>
                </div>
                <div class="room-card" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span><i class="fas fa-map-marker-alt"></i> ${currentUserData.country || 'السعودية'}</span>
                </div>
                <div class="room-card" style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span><i class="fas fa-info-circle"></i> ${currentUserData.bio || 'مرحباً! أنا عضو جديد في مجلس'}</span>
                </div>
                
                <button onclick="logout()" style="width:100%; padding:14px; background:#ef4444; border:none; border-radius:25px; color:white;"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
            `;
        }

        // ========== شاشة الدردشة ==========
        window.openChatRoom = async (roomId, roomName) => {
            if (messagesListener) messagesListener.off();
            currentChatRoom = roomId;
            currentChatRoomName = roomName;
            
            document.getElementById('app').innerHTML = `
                <div class="chat-screen">
                    <div class="chat-header">
                        <button class="back-btn" onclick="closeChatRoom()"><i class="fas fa-arrow-right"></i></button>
                        <div class="chat-room-name">${roomName}</div>
                        <button class="gift-btn" onclick="showGiftMenu()" style="background:none; font-size:22px;">🎁</button>
                    </div>
                    <div class="room-announcement" id="roomAnnouncement">
                        📢 مرحباً بك في ${roomName} - يرجى احترام الآخرين
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="input-area">
                        <input type="text" id="msgInput" class="message-input" placeholder="اكتب رسالتك...">
                        <button class="send-btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            `;
            
            loadChatMessages();
        };

        function loadChatMessages() {
            const ref = db.ref(`messages/${currentChatRoom}`);
            const container = document.getElementById('messagesArea');
            if (!container) return;
            container.innerHTML = '';
            
            messagesListener = ref.orderByChild('timestamp').limitToLast(100).on('child_added', (snap) => {
                const msg = snap.val();
                const isOwn = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message-bubble ${isOwn ? 'message-right' : 'message-left'}`;
                
                let senderHtml = '';
                if (!isOwn && currentChatRoom === 'public') {
                    senderHtml = `<div class="message-sender">${msg.senderUsername}</div>`;
                }
                if (msg.type === 'gift') {
                    div.innerHTML = `🎁 ${msg.senderUsername} أرسل هدية 🎁<div class="message-time">${formatTime(msg.timestamp)}</div>`;
                } else {
                    div.innerHTML = senderHtml + msg.text + `<div class="message-time">${formatTime(msg.timestamp)}</div>`;
                }
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendChatMessage = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            await db.ref(`messages/${currentChatRoom}`).push({
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                senderAvatar: currentUserData.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = '';
        };

        window.showGiftMenu = () => {
            const giftOptions = ['🌹 وردة (5 عملات)', '🎈 بالون (10 عملات)', '🍫 شوكولاتة (15 عملة)', '💎 ماسة (50 عملة)', '🏆 كأس (100 عملة)'];
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="margin-bottom:15px;">🎁 إرسال هدية</h3>
                    ${giftOptions.map((gift, i) => {
                        const price = [5, 10, 15, 50, 100][i];
                        return `<button onclick="sendGiftMessage('${gift.split(' ')[0]} ${gift.split(' ')[1]}', ${price})" style="width:100%; margin:5px 0; padding:10px; background:var(--surface); border:none; border-radius:20px; color:white; cursor:pointer;">${gift}</button>`;
                    }).join('')}
                    <button onclick="this.closest('.modal').remove()" style="width:100%; margin-top:15px; padding:10px; background:transparent; border:1px solid var(--border); border-radius:20px; color:white;">إلغاء</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.sendGiftMessage = async (gift, price) => {
            if (currentUserData.coins < price) {
                showToast('لا يوجد عملات كافية');
                return;
            }
            await db.ref(`users/${currentUser.uid}`).update({ coins: currentUserData.coins - price });
            currentUserData.coins -= price;
            await db.ref(`messages/${currentChatRoom}`).push({
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                type: 'gift',
                text: gift,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            document.querySelector('.modal').remove();
            showToast(`🎁 أرسلت ${gift}`);
        };

        window.closeChatRoom = () => {
            if (messagesListener) messagesListener.off();
            renderMainApp();
        };

        window.showCreateRoomModal = () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>🏠 إنشاء غرفة جديدة</h3>
                    <input type="text" id="newRoomName" class="modal-input" placeholder="اسم الغرفة">
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button onclick="createNewRoom()" class="auth-btn" style="margin:0;">إنشاء</button>
                        <button onclick="this.closest('.modal').remove()" class="auth-btn" style="background:#1a1a1a; margin:0;">إلغاء</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.createNewRoom = async () => {
            const name = document.getElementById('newRoomName').value.trim();
            if (!name) return showToast('أدخل اسم الغرفة');
            const roomId = db.ref('rooms').push().key;
            await db.ref(`rooms/${roomId}`).set({
                id: roomId, name, ownerId: currentUser.uid, memberCount: 1,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            document.querySelector('.modal').remove();
            showToast('تم إنشاء الغرفة');
            renderHomePage();
        };

        window.logout = async () => {
            await db.ref(`users/${currentUser.uid}`).update({ online: false });
            await auth.signOut();
            renderAuth();
        };

        // ========== مراقبة المستخدم ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const snap = await db.ref(`users/${user.uid}`).once('value');
                if (!snap.exists() || !snap.val().profileCompleted) {
                    renderCompleteProfile();
                } else {
                    currentUserData = snap.val();
                    await db.ref(`users/${user.uid}`).update({ online: true });
                    renderMainApp();
                }
            } else {
                renderAuth();
            }
        });

        // إنشاء حساب أدمن تلقائي
        setTimeout(async () => {
            try {
                await auth.createUserWithEmailAndPassword('admin@chatksa.com', 'Admin@123456');
                console.log('Admin account ready');
            } catch(e) {}
        }, 2000);
    </script>
</body>
</html>
