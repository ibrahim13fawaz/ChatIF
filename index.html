<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دردشة اجتماعي - منصة التواصل المتكاملة</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f0f0f;
            --darker: #1a1a1a;
            --dark-card: #242424;
            --light: #ffffff;
            --gray: #9ca3af;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow: hidden;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--dark), var(--darker));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* شاشات المصادقة */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--dark), var(--darker));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
        }

        .auth-container {
            background: var(--dark-card);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header i {
            font-size: 70px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .auth-header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-form h2 {
            margin-bottom: 25px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: var(--darker);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: var(--light);
            font-size: 16px;
            transition: all 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        /* التطبيق الرئيسي */
        .app-screen {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* الشريط الجانبي */
        .sidebar {
            width: 300px;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .sidebar-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            background: var(--dark-card);
            border: 2px solid var(--primary);
        }

        .sidebar-user-info {
            flex: 1;
        }

        .sidebar-username {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .sidebar-level {
            font-size: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--gray);
            padding: 14px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
        }

        .nav-btn i {
            width: 24px;
        }

        .nav-btn:hover {
            background: var(--dark-card);
            color: var(--light);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* شاشة الدردشة */
        .chat-header {
            padding: 20px 25px;
            background: var(--darker);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
        }

        .online-count {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 15px;
            border-radius: 30px;
            color: var(--secondary);
            font-size: 14px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--dark-card);
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 5px;
        }

        .message-username {
            font-weight: 700;
            font-size: 14px;
            color: var(--primary);
        }

        .message-time {
            font-size: 11px;
            color: var(--gray);
        }

        .message-text {
            background: var(--dark-card);
            padding: 12px 18px;
            border-radius: 18px;
            display: inline-block;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-own {
            flex-direction: row-reverse;
        }

        .message-own .message-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message-own .message-text {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .chat-input-container {
            padding: 20px 25px;
            background: var(--darker);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .emoji-btn, .send-btn {
            width: 48px;
            height: 48px;
            background: var(--dark-card);
            border: none;
            border-radius: 15px;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .emoji-btn:hover, .send-btn:hover {
            background: var(--primary);
            color: white;
        }

        .message-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--dark-card);
            border: none;
            border-radius: 25px;
            color: var(--light);
            font-size: 16px;
        }

        /* شاشة الغرف */
        .rooms-header, .friends-header, .profile-header, .search-header {
            padding: 20px 25px;
            background: var(--darker);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .create-room-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rooms-list, .friends-list, .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .room-card, .friend-card {
            background: var(--dark-card);
            padding: 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-card:hover, .friend-card:hover {
            transform: translateX(5px);
            background: var(--darker);
        }

        .room-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .room-info, .friend-info {
            flex: 1;
        }

        .room-name, .friend-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 5px;
        }

        /* شاشة الملف الشخصي */
        .profile-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            margin-bottom: 20px;
            position: relative;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .profile-id {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin: 25px 0;
        }

        .stat-card {
            background: var(--dark-card);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray);
            margin-top: 5px;
        }

        .xp-bar {
            width: 100%;
            max-width: 500px;
            height: 12px;
            background: var(--dark-card);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .xp-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            border-radius: 10px;
            transition: width 0.5s;
        }

        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
            max-width: 500px;
        }

        .badge {
            background: var(--dark-card);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--warning);
        }

        .badge i {
            color: var(--warning);
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
        }

        /* المحادثة الخاصة */
        .private-chat-overlay {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 400px;
            background: var(--darker);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* النوافذ المنبثقة */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--dark-card);
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* الإشعارات */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 50px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10001;
            animation: slideUp 0.3s ease;
        }

        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.success { background: linear-gradient(135deg, #10b981, #059669); }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* التجاوب */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                right: -300px;
                top: 0;
                bottom: 0;
                z-index: 1500;
            }
            .sidebar.open {
                right: 0;
            }
            .toggle-sidebar {
                display: block;
                background: none;
                border: none;
                color: var(--light);
                font-size: 24px;
                cursor: pointer;
            }
            .private-chat-overlay {
                width: 100%;
            }
        }

        /* التمرير */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--darker);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px;">جاري تحميل التطبيق...</p>
    </div>

    <div id="appContent"></div>

    <script>
        // ========== إعدادات Firebase ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1x9fJe6zPFo7yiK1kSRsoR89aSff5k",
            authDomain: "itchat-web-8c4ed.firebaseapp.com",
            databaseURL: "https://itchat-web-8c4ed-default-rtdb.firebaseio.com",
            projectId: "itchat-web-8c4ed",
            storageBucket: "itchat-web-8c4ed.firebasestorage.app",
            messagingSenderId: "787261764804",
            appId: "1:787261764804:web:7af9a924d03989b1dbc591"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ========== متغيرات عامة ==========
        let currentUser = null;
        let currentUserData = null;
        let currentRoom = 'public';
        let currentPrivateChat = null;
        let messagesListener = null;
        let selectedGender = null;

        // ========== دوال مساعدة ==========
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function generateRandomId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function isUsernameUnique(username) {
            const snapshot = await database.ref('users').orderByChild('username').equalTo(username).once('value');
            return !snapshot.exists();
        }

        function formatTime(timestamp) {
            if (!timestamp) return 'الآن';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'الآن';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} دقيقة`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} ساعة`;
            return date.toLocaleDateString('ar');
        }

        // ========== عرض الشاشات ==========
        function showAuthScreen() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('appContent').innerHTML = getAuthScreenHTML();
        }

        function showCompleteProfileScreen() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('appContent').innerHTML = getCompleteProfileScreenHTML();
        }

        function showMainApp() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('appContent').innerHTML = getMainAppHTML();
            initializeAppFeatures();
        }

        // ========== واجهة تسجيل الدخول ==========
        function getAuthScreenHTML() {
            return `
                <div class="auth-screen">
                    <div class="auth-container">
                        <div class="auth-header">
                            <i class="fas fa-comments"></i>
                            <h1>دردشة اجتماعي</h1>
                            <p style="color: var(--gray);">تواصل مع الأصدقاء حول العالم</p>
                        </div>
                        <div id="loginForm" class="auth-form">
                            <h2>تسجيل الدخول</h2>
                            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="auth-input">
                            <input type="password" id="loginPassword" placeholder="كلمة المرور" class="auth-input">
                            <button onclick="login()" class="auth-btn">دخول</button>
                            <div class="auth-divider" style="text-align: center; margin: 20px 0; color: var(--gray);">أو</div>
                            <button onclick="showRegister()" class="auth-btn" style="background: var(--dark-card);">إنشاء حساب جديد</button>
                        </div>
                        <div id="registerForm" class="auth-form" style="display: none;">
                            <h2>إنشاء حساب</h2>
                            <input type="email" id="registerEmail" placeholder="البريد الإلكتروني" class="auth-input">
                            <input type="password" id="registerPassword" placeholder="كلمة المرور" class="auth-input">
                            <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" class="auth-input">
                            <button onclick="register()" class="auth-btn">إنشاء حساب</button>
                            <div class="auth-divider" style="text-align: center; margin: 20px 0; color: var(--gray);">أو</div>
                            <button onclick="showLogin()" class="auth-btn" style="background: var(--dark-card);">عودة لتسجيل الدخول</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ========== واجهة إكمال الملف الشخصي ==========
        function getCompleteProfileScreenHTML() {
            return `
                <div class="auth-screen">
                    <div class="auth-container">
                        <div class="auth-header">
                            <i class="fas fa-user-astronaut"></i>
                            <h1>أهلاً بك!</h1>
                            <p style="color: var(--gray);">أكمل بياناتك للبدء</p>
                        </div>
                        <div class="avatar-selection" style="display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;">
                            <div onclick="selectGender('male')" id="maleAvatar" style="text-align: center; padding: 15px; border-radius: 20px; cursor: pointer; border: 2px solid transparent;">
                                <i class="fas fa-user-astronaut" style="font-size: 50px;"></i>
                                <div>ذكر 👨</div>
                            </div>
                            <div onclick="selectGender('female')" id="femaleAvatar" style="text-align: center; padding: 15px; border-radius: 20px; cursor: pointer; border: 2px solid transparent;">
                                <i class="fas fa-user-ninja" style="font-size: 50px;"></i>
                                <div>أنثى 👩</div>
                            </div>
                        </div>
                        <select id="countrySelect" class="auth-input">
                            <option value="">🌍 اختر الدولة</option>
                            <option value="السعودية">🇸🇦 السعودية</option>
                            <option value="مصر">🇪🇬 مصر</option>
                            <option value="الإمارات">🇦🇪 الإمارات</option>
                            <option value="الكويت">🇰🇼 الكويت</option>
                            <option value="قطر">🇶🇦 قطر</option>
                            <option value="عمان">🇴🇲 عمان</option>
                            <option value="البحرين">🇧🇭 البحرين</option>
                            <option value="الأردن">🇯🇴 الأردن</option>

        // ========== دوال المصادقة ==========
        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showToast('الرجاء إدخال جميع البيانات', 'error');
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showToast('تم تسجيل الدخول بنجاح');
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        window.register = async function() {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!email || !password) {
                showToast('الرجاء إدخال جميع البيانات', 'error');
                return;
            }
            if (password !== confirm) {
                showToast('كلمة المرور غير متطابقة', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                showToast('تم إنشاء الحساب بنجاح');
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        window.showRegister = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        window.showLogin = function() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };

        window.selectGender = function(gender) {
            selectedGender = gender;
            document.getElementById('maleAvatar').style.borderColor = gender === 'male' ? 'var(--primary)' : 'transparent';
            document.getElementById('femaleAvatar').style.borderColor = gender === 'female' ? 'var(--primary)' : 'transparent';
        };

        window.completeProfile = async function() {
            const username = document.getElementById('usernameInput').value.trim();
            const country = document.getElementById('countrySelect').value;
            if (!selectedGender) {
                showToast('الرجاء اختيار الجنس', 'error');
                return;
            }
            if (!country) {
                showToast('الرجاء اختيار الدولة', 'error');
                return;
            }
            if (!username) {
                showToast('الرجاء إدخال اسم المستخدم', 'error');
                return;
            }
            if (username.length < 3) {
                showToast('اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'error');
                return;
            }
            const isUnique = await isUsernameUnique(username);
            if (!isUnique) {
                showToast('اسم المستخدم موجود بالفعل', 'error');
                return;
            }
            const avatar = selectedGender === 'male' ? '👨' : '👩';
            const userId = generateRandomId();
            const userData = {
                uid: currentUser.uid,
                username: username,
                avatar: avatar,
                gender: selectedGender,
                country: country,
                userId: userId,
                level: 0,
                xp: 0,
                online: true,
                lastSeen: firebase.database.ServerValue.TIMESTAMP,
                friends: {},
                requests: {},
                badges: ['🆕 جديد'],
                profileCompleted: true,
                canChangeUsername: true,
                bio: '',
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };
            try {
                await database.ref(`users/${currentUser.uid}`).set(userData);
                currentUserData = userData;
                showMainApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        };

        // ========== دوال التطبيق الرئيسية ==========
        async function initializeAppFeatures() {
            await loadUserData();
            loadMessages();
            loadOnlineCount();
            loadRooms();
            loadFriends();
            loadProfile();
            setupEmojiPicker();
            
            // التنقل بين التبويبات
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
                    document.getElementById(`${tab}Tab`).style.display = 'flex';
                    if (tab === 'rooms') loadRooms();
                    if (tab === 'friends') loadFriends();
                    if (tab === 'profile') loadProfile();
                });
            });
        }

        async function loadUserData() {
            const snapshot = await database.ref(`users/${currentUser.uid}`).once('value');
            currentUserData = snapshot.val();
            document.getElementById('sidebarAvatar').textContent = currentUserData.avatar;
            document.getElementById('sidebarUsername').textContent = currentUserData.username;
            document.getElementById('sidebarLevel').innerHTML = `<i class="fas fa-star"></i> مستوى ${currentUserData.level}`;
        }

        function loadMessages() {
            if (messagesListener) messagesListener.off();
            const messagesRef = database.ref('messages/public');
            const container = document.getElementById('messagesList');
            container.innerHTML = '';
            messagesListener = messagesRef.orderByChild('timestamp').limitToLast(100).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const isOwn = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'message-own' : ''}`;
                div.innerHTML = `
                    <div class="message-avatar">${msg.senderAvatar || '👤'}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-username">${msg.senderUsername || 'مستخدم'}</span>
                            <span class="message-time">${formatTime(msg.timestamp)}</span>
                        </div>
                        <div class="message-text">${msg.text}</div>
                    </div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const message = {
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                senderAvatar: currentUserData.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            await database.ref('messages/public').push(message);
            input.value = '';
        };

        function loadOnlineCount() {
            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                let online = 0;
                if (users) online = Object.values(users).filter(u => u.online === true).length;
                document.getElementById('onlineCount').innerHTML = `<i class="fas fa-circle"></i><span>${online} متصل</span>`;
            });
        }

        function loadRooms() {
            database.ref('rooms').on('value', (snapshot) => {
                const container = document.getElementById('roomsList');
                container.innerHTML = '';
                const rooms = snapshot.val();
                if (rooms) {
                    Object.values(rooms).forEach(room => {
                        const div = document.createElement('div');
                        div.className = 'room-card';
                        div.innerHTML = `
                            <div class="room-icon">${room.image || '🏠'}</div>
                            <div class="room-info">
                                <div class="room-name">${room.name}</div>
                                <div style="font-size: 12px; color: var(--gray);">${room.ownerId === currentUser.uid ? '👑 مالك' : ''}</div>
                            </div>
                        `;
                        div.onclick = () => joinRoom(room.id);
                        container.appendChild(div);
                    });
                }
            });
        }

        async function joinRoom(roomId) {
            const roomSnap = await database.ref(`rooms/${roomId}`).once('value');
            const room = roomSnap.val();
            if (room?.bannedUsers?.[currentUser.uid]) {
                showToast('لقد تم حظرك من هذه الغرفة', 'error');
                return;
            }
            if (currentRoom !== 'public') {
                await database.ref(`rooms/${currentRoom}/usersOnline/${currentUser.uid}`).remove();
            }
            currentRoom = roomId;
            await database.ref(`rooms/${currentRoom}/usersOnline/${currentUser.uid}`).set({ username: currentUserData.username });
            const joinMessage = { senderId: 'system', senderUsername: 'النظام', text: `🚪 دخل: ${currentUserData.username}`, timestamp: firebase.database.ServerValue.TIMESTAMP };
            await database.ref(`messages/${currentRoom}`).push(joinMessage);
            if (messagesListener) messagesListener.off();
            loadMessages();
            showToast(`انضممت إلى ${room.name}`);
        }

        function loadFriends() {
            database.ref(`users/${currentUser.uid}/friends`).on('value', async (snapshot) => {
                const container = document.getElementById('friendsList');
                container.innerHTML = '';
                const friends = snapshot.val();
                if (!friends || Object.keys(friends).length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--gray);">لا يوجد أصدقاء بعد</div>';
                    return;
                }
                for (const [friendId, friend] of Object.entries(friends)) {
                    const userSnap = await database.ref(`users/${friendId}`).once('value');
                    const user = userSnap.val();
                    if (user) {
                        const div = document.createElement('div');
                        div.className = 'friend-card';
                        div.innerHTML = `
                            <div style="font-size: 45px;">${user.avatar}</div>
                            <div class="friend-info">
                                <div class="friend-name">${user.username}</div>
                                <div style="font-size: 12px; color: var(--gray);">${user.online ? '🟢 متصل الآن' : '⚫ غير متصل'}</div>
                            </div>
                            <button onclick="startPrivateChat('${friendId}')" style="background: var(--primary); border: none; padding: 8px 15px; border-radius: 20px; color: white; cursor: pointer;"><i class="fas fa-comment"></i></button>
                        `;
                        container.appendChild(div);
                    }
                }
            });
        }

        async function loadProfile() {
            const container = document.getElementById('profileInfo');
            const friendsCount = currentUserData.friends ? Object.keys(currentUserData.friends).length : 0;
            const xpProgress = (currentUserData.xp % 1000) / 10;
            container.innerHTML = `
                <div class="profile-avatar">${currentUserData.avatar}</div>
                <div class="profile-username">${currentUserData.username}</div>
                <div class="profile-id">#${currentUserData.userId}</div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${currentUserData.level}</div><div class="stat-label">المستوى</div></div>
                    <div class="stat-card"><div class="stat-value">${currentUserData.xp || 0}</div><div class="stat-label">XP</div></div>
                    <div class="stat-card"><div class="stat-value">${friendsCount}</div><div class="stat-label">الأصدقاء</div></div>
                </div>
                <div class="xp-bar"><div class="xp-progress" style="width: ${xpProgress}%"></div></div>
                <div class="badges-container">
                    ${currentUserData.badges.map(b => `<div class="badge"><i class="fas fa-medal"></i> ${b}</div>`).join('')}
                </div>
                <div class="info-row"><i class="fas fa-venus-mars"></i><span>الجنس: ${currentUserData.gender === 'male' ? 'ذكر' : 'أنثى'}</span></div>
                <div class="info-row"><i class="fas fa-map-marker-alt"></i><span>الدولة: ${currentUserData.country}</span></div>
                <div class="info-row"><i class="fas fa-info-circle"></i><span>السيرة: ${currentUserData.bio || 'لا توجد سيرة'}</span></div>
                <button onclick="editProfile()" class="create-room-btn" style="margin-top: 20px;"><i class="fas fa-edit"></i> تعديل الملف الشخصي</button>
            `;
        }

        window.editProfile = function() {
            const newBio = prompt('السيرة الذاتية الجديدة:', currentUserData.bio || '');
            if (newBio !== null) {
                database.ref(`users/${currentUser.uid}`).update({ bio: newBio });
                currentUserData.bio = newBio;
                showToast('تم تحديث السيرة الذاتية');
                loadProfile();
            }
        };

        window.searchUsers = async function() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) return;
            const snapshot = await database.ref('users').orderByChild('username').startAt(searchTerm).endAt(searchTerm + '\uf8ff').once('value');
            const users = snapshot.val();
            const container = document.getElementById('searchResults');
            container.innerHTML = '';
            if (users) {
                for (const [uid, user] of Object.entries(users)) {
                    if (uid !== currentUser.uid) {
                        const div = document.createElement('div');
                        div.className = 'friend-card';
                        div.innerHTML = `
                            <div style="font-size: 45px;">${user.avatar}</div>
                            <div class="friend-info">
                                <div class="friend-name">${user.username}</div>
                                <div style="font-size: 12px; color: var(--gray);">${user.country}</div>
                            </div>
                            <button onclick="sendFriendRequest('${uid}')" style="background: var(--primary); border: none; padding: 8px 15px; border-radius: 20px; color: white; cursor: pointer;"><i class="fas fa-user-plus"></i></button>
                        `;
                        container.appendChild(div);
                    }
                }
            } else {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--gray);">لا توجد نتائج</div>';
            }
        };

        window.sendFriendRequest = async function(toUserId) {
            const userSnap = await database.ref(`users/${toUserId}`).once('value');
            const user = userSnap.val();
            const requestData = {
                fromUserId: currentUser.uid,
                fromUsername: currentUserData.username,
                fromAvatar: currentUserData.avatar,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            await database.ref(`users/${toUserId}/requests/${currentUser.uid}`).set(requestData);
            showToast(`تم إرسال طلب صداقة إلى ${user.username}`);
        };

        window.startPrivateChat = async function(userId) {
            const chatId = [currentUser.uid, userId].sort().join('_');
            const userSnap = await database.ref(`users/${userId}`).once('value');
            const user = userSnap.val();
            currentPrivateChat = chatId;
            document.getElementById('privateChatUsername').textContent = user.username;
            document.getElementById('privateChatAvatar').textContent = user.avatar;
            document.getElementById('privateChatOverlay').style.display = 'flex';
            const container = document.getElementById('privateMessages');
            container.innerHTML = '';
            database.ref(`privateChats/${chatId}`).orderByChild('timestamp').on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const isOwn = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'message-own' : ''}`;
                div.innerHTML = `
                    <div class="message-avatar">${msg.senderAvatar}</div>
                    <div class="message-content">
                        <div class="message-text">${msg.text}</div>
                        <div class="message-time">${formatTime(msg.timestamp)}</div>
                    </div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        };

        window.sendPrivateMessage = async function() {
            const input = document.getElementById('privateMessageInput');
            const text = input.value.trim();
            if (!text || !currentPrivateChat) return;
            const message = {
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                senderAvatar: currentUserData.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            await database.ref(`privateChats/${currentPrivateChat}`).push(message);
            input.value = '';
        };

        window.closePrivateChat = function() {
            currentPrivateChat = null;
            document.getElementById('privateChatOverlay').style.display = 'none';
        };

        window.showCreateRoomModal = function() {
            const roomName = prompt('أدخل اسم الغرفة:');
            if (!roomName) return;
            const roomId = database.ref('rooms').push().key;
            database.ref(`rooms/${roomId}`).set({
                id: roomId,
                name: roomName,
                image: '🏠',
                ownerId: currentUser.uid,
                admins: [currentUser.uid],
                bannedUsers: {},
                createdAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => showToast('تم إنشاء الغرفة بنجاح'));
        };

        function setupEmojiPicker() {
            const emojis = ['😀', '😂', '😍', '🥰', '😎', '🤔', '😢', '😡', '👍', '❤️', '🔥', '🎉', '⭐', '🏆', '👑', '💬'];
            const picker = document.getElementById('emojiPicker');
            const btn = document.getElementById('emojiBtn');
            if (!picker || !btn) return;
            picker.innerHTML = '';
            emojis.forEach(emoji => {
                const span = document.createElement('span');
                span.textContent = emoji;
                span.style.fontSize = '28px';
                span.style.cursor = 'pointer';
                span.style.padding = '5px';
                span.onclick = () => {
                    const input = document.getElementById('messageInput');
                    input.value += emoji;
                    input.focus();
                    picker.style.display = 'none';
                };
                picker.appendChild(span);
            });
            btn.onclick = () => {
                picker.style.display = picker.style.display === 'none' ? 'grid' : 'none';
            };
        }

        window.logout = async function() {
            await database.ref(`users/${currentUser.uid}`).update({ online: false });
            await auth.signOut();
            location.reload();
        };

        window.showTab = function(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(`${tab}Tab`).style.display = 'flex';
            if (tab === 'rooms') loadRooms();
            if (tab === 'friends') loadFriends();
            if (tab === 'profile') loadProfile();
        };

        // ========== مراقبة حالة المستخدم ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const userData = await database.ref(`users/${user.uid}`).once('value');
                if (!userData.exists() || !userData.val().profileCompleted) {
                    showCompleteProfileScreen();
                } else {
                    currentUserData = userData.val();
                    await database.ref(`users/${user.uid}`).update({ online: true });
                    showMainApp();
                }
            } else {
                showAuthScreen();
            }
        });

        // إنشاء حساب الأدمن تلقائياً
        setTimeout(async () => {
            try {
                await auth.createUserWithEmailAndPassword('admin@chatksa.com', 'Admin@123456');
                console.log('Admin account created');
            } catch(e) {}
        }, 1000);
    </script>
