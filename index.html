<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة اجتماعي - تواصل مع الأصدقاء</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --card: #1a1a1a;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --border: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* شاشة تسجيل الدخول */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .auth-card {
            background: var(--card);
            border-radius: 40px;
            padding: 35px 25px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header i {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .auth-header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* التطبيق الرئيسي */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
        }

        /* رأس التطبيق */
        .app-header {
            padding: 15px 20px;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
        }

        /* المحتوى الرئيسي - قابل للتمرير */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* بطاقة الغرفة الرئيسية */
        .main-room-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .main-room-card:active {
            transform: scale(0.98);
        }

        .main-room-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-room-status {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 8px;
        }

        /* قسم الغرف الخاصة */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .create-room-btn {
            background: var(--card);
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
        }

        /* بطاقات الغرف */
        .room-card {
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-card:active {
            transform: scale(0.98);
        }

        .room-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .room-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* حقل إضافة صديق */
        .add-friend-section {
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
        }

        .add-friend-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .add-friend-input-group {
            display: flex;
            gap: 10px;
        }

        .add-friend-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 14px;
        }

        .add-friend-btn {
            background: var(--primary);
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        /* قائمة الأصدقاء */
        .friends-list {
            margin-top: 10px;
        }

        .friend-card {
            background: var(--card);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .friend-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 700;
            font-size: 15px;
        }

        .friend-status {
            font-size: 11px;
            color: var(--success);
        }

        /* شاشة الدردشة */
        .chat-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:active {
            background: var(--card);
        }

        .chat-room-info {
            flex: 1;
        }

        .chat-room-name {
            font-weight: 700;
            font-size: 18px;
        }

        .chat-room-status {
            font-size: 11px;
            color: var(--success);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-left {
            align-self: flex-start;
            background: var(--card);
            border-bottom-left-radius: 5px;
        }

        .message-right {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 5px;
        }

        .message-sender {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 12px 15px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--card);
            border: none;
            border-radius: 25px;
            color: var(--text);
            font-size: 15px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* نافذة إنشاء غرفة */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: var(--card);
            border-radius: 30px;
            padding: 25px;
            width: 85%;
            max-width: 320px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            margin: 15px 0;
            font-size: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-btn.confirm {
            background: var(--primary);
            color: white;
        }

        .modal-btn.cancel {
            background: var(--surface);
            color: var(--text);
        }

        /* إشعارات */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 4000;
            animation: fadeUp 0.3s ease;
            font-size: 13px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* أزرار الإجراءات */
        .action-btn {
            background: var(--card);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1x9fJe6zPFo7yiK1kSRsoR89aSff5k",
            authDomain: "itchat-web-8c4ed.firebaseapp.com",
            databaseURL: "https://itchat-web-8c4ed-default-rtdb.firebaseio.com",
            projectId: "itchat-web-8c4ed",
            storageBucket: "itchat-web-8c4ed.firebasestorage.app",
            messagingSenderId: "787261764804",
            appId: "1:787261764804:web:7af9a924d03989b1dbc591"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentUserData = null;
        let currentChatRoom = null;
        let currentChatName = null;
        let messagesListener = null;
        let selectedGender = null;

        // ========== دوال مساعدة ==========
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function generateId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function isUsernameUnique(username) {
            const snap = await db.ref('users').orderByChild('username').equalTo(username).once('value');
            return !snap.exists();
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
        }

        // ========== واجهة تسجيل الدخول ==========
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <div class="auth-header">
                            <i class="fas fa-comments"></i>
                            <h1>دردشة اجتماعي</h1>
                            <p style="color: #9ca3af; font-size: 13px; margin-top: 8px;">تواصل مع الأصدقاء حول العالم</p>
                        </div>
                        <div id="loginForm">
                            <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني" autocomplete="email">
                            <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور" autocomplete="current-password">
                            <button onclick="handleLogin()" class="auth-btn">دخول</button>
                            <button onclick="showRegisterForm()" class="auth-btn" style="background: #1a1a1a; margin-top: 10px;">إنشاء حساب جديد</button>
                        </div>
                        <div id="registerForm" style="display: none;">
                            <input type="email" id="regEmail" class="auth-input" placeholder="البريد الإلكتروني" autocomplete="email">
                            <input type="password" id="regPassword" class="auth-input" placeholder="كلمة المرور" autocomplete="new-password">
                            <input type="password" id="regConfirm" class="auth-input" placeholder="تأكيد كلمة المرور">
                            <button onclick="handleRegister()" class="auth-btn">إنشاء حساب</button>
                            <button onclick="showLoginForm()" class="auth-btn" style="background: #1a1a1a; margin-top: 10px;">عودة</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if (!email || !pwd) return showToast('❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور');
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
            } catch(e) { 
                if (e.code === 'auth/invalid-credential') showToast('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة');
                else showToast('❌ ' + e.message);
            }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!email || !pwd) return showToast('❌ الرجاء إدخال جميع البيانات');
            if (pwd !== confirm) return showToast('❌ كلمة المرور غير متطابقة');
            if (pwd.length < 6) return showToast('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
            try {
                await auth.createUserWithEmailAndPassword(email, pwd);
            } catch(e) {
                if (e.code === 'auth/email-already-in-use') showToast('❌ البريد الإلكتروني مستخدم بالفعل');
                else showToast('❌ ' + e.message);
            }
        };

        window.showRegisterForm = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        window.showLoginForm = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };

        // ========== إكمال الملف الشخصي ==========
        function renderCompleteProfile() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <div class="auth-header">
                            <i class="fas fa-user-astronaut"></i>
                            <h1>مرحباً بك!</h1>
                            <p style="color: #9ca3af; font-size: 13px;">أكمل بياناتك للبدء</p>
                        </div>
                        <div style="display: flex; justify-content: center; gap: 25px; margin-bottom: 25px;">
                            <div onclick="selectGender('male')" id="maleBox" style="text-align: center; padding: 12px 20px; border-radius: 20px; cursor: pointer; border: 2px solid transparent;">
                                <i class="fas fa-user-astronaut" style="font-size: 40px;"></i>
                                <div style="font-size: 13px;">ذكر</div>
                            </div>
                            <div onclick="selectGender('female')" id="femaleBox" style="text-align: center; padding: 12px 20px; border-radius: 20px; cursor: pointer; border: 2px solid transparent;">
                                <i class="fas fa-user-ninja" style="font-size: 40px;"></i>
                                <div style="font-size: 13px;">أنثى</div>
                            </div>
                        </div>
                        <select id="countrySelect" class="auth-input">
                            <option value="">🌍 اختر الدولة</option>
                            <option value="السعودية">🇸🇦 السعودية</option>
                            <option value="مصر">🇪🇬 مصر</option>
                            <option value="الإمارات">🇦🇪 الإمارات</option>
                            <option value="الكويت">🇰🇼 الكويت</option>
                            <option value="قطر">🇶🇦 قطر</option>
                            <option value="عمان">🇴🇲 عمان</option>
                            <option value="البحرين">🇧🇭 البحرين</option>
                            <option value="الأردن">🇯🇴 الأردن</option>
                            <option value="لبنان">🇱🇧 لبنان</option>
                            <option value="العراق">🇮🇶 العراق</option>
                        </select>
                        <input type="text" id="username" class="auth-input" placeholder="👤 اسم المستخدم (فريد)">
                        <button onclick="completeProfile()" class="auth-btn">🚀 ابدأ</button>
                    </div>
                </div>
            `;
        }

        window.selectGender = (g) => {
            selectedGender = g;
            document.getElementById('maleBox').style.borderColor = g === 'male' ? '#6366f1' : 'transparent';
            document.getElementById('femaleBox').style.borderColor = g === 'female' ? '#6366f1' : 'transparent';
            document.getElementById('maleBox').style.background = g === 'male' ? 'rgba(99,102,241,0.1)' : 'transparent';
            document.getElementById('femaleBox').style.background = g === 'female' ? 'rgba(99,102,241,0.1)' : 'transparent';
        };

        window.completeProfile = async () => {
            const username = document.getElementById('username').value.trim();
            const country = document.getElementById('countrySelect').value;
            if (!selectedGender) return showToast('❌ الرجاء اختيار الجنس');
            if (!country) return showToast('❌ الرجاء اختيار الدولة');
            if (!username) return showToast('❌ الرجاء إدخال اسم المستخدم');
            if (username.length < 3) return showToast('❌ اسم المستخدم يجب أن يكون 3 أحرف على الأقل');
            if (!await isUsernameUnique(username)) return showToast('❌ اسم المستخدم موجود بالفعل');
            
            const avatar = selectedGender === 'male' ? '👨' : '👩';
            const userId = generateId();
            await db.ref(`users/${currentUser.uid}`).set({
                uid: currentUser.uid,
                username, avatar, gender: selectedGender, country,
                userId: userId, level: 0, xp: 0, online: true,
                lastSeen: firebase.database.ServerValue.TIMESTAMP,
                friends: {}, requests: {}, badges: ['🆕 جديد'],
                profileCompleted: true, canChangeUsername: true, bio: '',
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            currentUserData = (await db.ref(`users/${currentUser.uid}`).once('value')).val();
            renderMainHome();
        };

        // ========== الصفحة الرئيسية ==========
        function renderMainHome() {
            document.getElementById('app').innerHTML = `
                <div class="app-container">
                    <div class="app-header">
                        <div class="header-title">دردشة اجتماعي</div>
                        <div class="header-actions">
                            <button class="icon-btn" id="profileBtn"><i class="fas fa-user-circle"></i></button>
                        </div>
                    </div>
                    <div class="main-content" id="mainContent"></div>
                </div>
            `;
            document.getElementById('profileBtn').onclick = renderProfilePage;
            loadHomeContent();
        }

        async function loadHomeContent() {
            const container = document.getElementById('mainContent');
            
            // تحديث حالة المستخدم
            await db.ref(`users/${currentUser.uid}`).update({ online: true });
            
            // جلب عدد المتصلين
            const usersSnap = await db.ref('users').once('value');
            const users = usersSnap.val();
            let onlineCount = 0;
            if (users) onlineCount = Object.values(users).filter(u => u.online === true).length;
            
            // جلب الغرف
            const roomsSnap = await db.ref('rooms').once('value');
            const rooms = roomsSnap.val();
            const roomsList = rooms ? Object.values(rooms) : [];
            
            container.innerHTML = `
                <!-- الغرفة الرئيسية -->
                <div class="main-room-card" onclick="openChatRoom('public', 'الغرفة الرئيسية')">
                    <div class="main-room-title">
                        <i class="fas fa-globe"></i> الغرفة الرئيسية
                    </div>
                    <div class="main-room-status">
                        <i class="fas fa-circle" style="font-size: 8px;"></i> ${onlineCount} متصل الآن
                    </div>
                </div>
                
                <!-- إضافة صديق عبر ID -->
                <div class="add-friend-section">
                    <div class="add-friend-title"><i class="fas fa-user-plus"></i> إضافة صديق</div>
                    <div class="add-friend-input-group">
                        <input type="text" id="friendIdInput" class="add-friend-input" placeholder="أدخل ID المستخدم (مثال: 123456)" autocomplete="off">
                        <button class="add-friend-btn" onclick="addFriendById()">إضافة</button>
                    </div>
                </div>
                
                <!-- الغرف الخاصة -->
                <div class="section-title">
                    <span><i class="fas fa-users"></i> غرفتي</span>
                    <button class="create-room-btn" onclick="showCreateRoomModal()">+ إنشاء غرفة</button>
                </div>
                <div id="myRoomsList"></div>
                
                <!-- أصدقائي -->
                <div class="section-title">
                    <span><i class="fas fa-user-friends"></i> أصدقائي</span>
                </div>
                <div id="friendsList" class="friends-list"></div>
            `;
            
            // عرض الغرف الخاصة (التي أنشأها المستخدم)
            const myRooms = roomsList.filter(r => r.ownerId === currentUser.uid);
            const myRoomsContainer = document.getElementById('myRoomsList');
            if (myRooms.length === 0) {
                myRoomsContainer.innerHTML = '<div class="empty-state">ليس لديك غرف خاصة بعد</div>';
            } else {
                myRoomsContainer.innerHTML = myRooms.map(room => `
                    <div class="room-card" onclick="openChatRoom('${room.id}', '${room.name.replace(/'/g, "\\'")}')">
                        <div class="room-icon">🏠</div>
                        <div class="room-info">
                            <div class="room-name">${room.name}</div>
                            <div class="room-meta">👑 مالك</div>
                        </div>
                    </div>
                `).join('');
            }
            
            // عرض الأصدقاء
            await loadFriendsList();
        }

        async function loadFriendsList() {
            const friendsSnap = await db.ref(`users/${currentUser.uid}/friends`).once('value');
            const friends = friendsSnap.val();
            const container = document.getElementById('friendsList');
            
            if (!friends || Object.keys(friends).length === 0) {
                container.innerHTML = '<div class="empty-state">لا يوجد أصدقاء بعد</div>';
                return;
            }
            
            let friendsHtml = '';
            for (const [fid] of Object.entries(friends)) {
                const userSnap = await db.ref(`users/${fid}`).once('value');
                const user = userSnap.val();
                if (user) {
                    friendsHtml += `
                        <div class="friend-card">
                            <div class="friend-avatar">${user.avatar}</div>
                            <div class="friend-info">
                                <div class="friend-name">${user.username}</div>
                                <div class="friend-status">${user.online ? '🟢 متصل' : '⚫ غير متصل'} • #${user.userId}</div>
                            </div>
                            <button class="action-btn" onclick="openChatRoom('private_${fid}', '${user.username.replace(/'/g, "\\'")}')">💬</button>
                        </div>
                    `;
                }
            }
            container.innerHTML = friendsHtml;
        }

        // ========== إضافة صديق عبر ID ==========
        window.addFriendById = async () => {
            const friendId = document.getElementById('friendIdInput').value.trim();
            if (!friendId) return showToast('❌ الرجاء إدخال ID المستخدم');
            
            // البحث عن المستخدم بالـ ID
            const usersSnap = await db.ref('users').once('value');
            const users = usersSnap.val();
            let foundUser = null;
            let foundUid = null;
            
            for (const [uid, user] of Object.entries(users)) {
                if (user.userId === friendId && uid !== currentUser.uid) {
                    foundUser = user;
                    foundUid = uid;
                    break;
                }
            }
            
            if (!foundUser) return showToast('❌ لا يوجد مستخدم بهذا ID');
            
            // التحقق من الصداقة الموجودة
            const existingFriend = await db.ref(`users/${currentUser.uid}/friends/${foundUid}`).once('value');
            if (existingFriend.exists()) return showToast('✅ هذا المستخدم صديق لك بالفعل');
            
            // إرسال طلب صداقة
            await db.ref(`users/${foundUid}/requests/${currentUser.uid}`).set({
                fromUserId: currentUser.uid,
                fromUsername: currentUserData.username,
                fromAvatar: currentUserData.avatar,
                fromId: currentUserData.userId,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            
            showToast(`✅ تم إرسال طلب صداقة إلى ${foundUser.username}`);
            document.getElementById('friendIdInput').value = '';
        };

        // ========== فتح غرفة الدردشة ==========
        window.openChatRoom = (roomId, roomName) => {
            if (messagesListener) messagesListener.off();
            currentChatRoom = roomId;
            currentChatName = roomName;
            
            document.getElementById('app').innerHTML = `
                <div class="chat-screen">
                    <div class="chat-header">
                        <button class="back-btn" onclick="closeChatRoom()"><i class="fas fa-arrow-right"></i></button>
                        <div class="chat-room-info">
                            <div class="chat-room-name">${roomName}</div>
                            <div class="chat-room-status" id="chatStatus"><i class="fas fa-circle" style="font-size: 8px;"></i> متصلون: 0</div>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="input-area">
                        <input type="text" id="msgInput" class="message-input" placeholder="اكتب رسالة...">
                        <button class="send-btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            `;
            
            loadChatMessages();
            
            if (roomId === 'public') {
                db.ref('users').on('value', (snap) => {
                    const users = snap.val();
                    let online = 0;
                    if (users) online = Object.values(users).filter(u => u.online === true).length;
                    const statusEl = document.getElementById('chatStatus');
                    if (statusEl) statusEl.innerHTML = `<i class="fas fa-circle" style="font-size: 8px;"></i> ${online} متصل`;
                });
            } else if (roomId.startsWith('private_')) {
                const friendId = roomId.replace('private_', '');
                db.ref(`users/${friendId}`).on('value', (snap) => {
                    const user = snap.val();
                    const statusEl = document.getElementById('chatStatus');
                    if (statusEl && user) {
                        statusEl.innerHTML = user.online ? '<i class="fas fa-circle" style="font-size: 8px; color: #10b981;"></i> متصل' : '<i class="fas fa-circle" style="font-size: 8px; color: #6b7280;"></i> غير متصل';
                    }
                });
            } else {
                db.ref(`rooms/${roomId}/usersOnline`).on('value', (snap) => {
                    const count = snap.numChildren();
                    const statusEl = document.getElementById('chatStatus');
                    if (statusEl) statusEl.innerHTML = `<i class="fas fa-circle" style="font-size: 8px;"></i> ${count} متصل`;
                });
            }
        };

        function loadChatMessages() {
            const ref = db.ref(`messages/${currentChatRoom}`);
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            
            messagesListener = ref.orderByChild('timestamp').limitToLast(100).on('child_added', (snap) => {
                const msg = snap.val();
                const isOwn = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message-bubble ${isOwn ? 'message-right' : 'message-left'}`;
                
                let senderHtml = '';
                if (!isOwn && currentChatRoom === 'public') {
                    senderHtml = `<div class="message-sender">${msg.senderUsername}</div>`;
                }
                if (!isOwn && currentChatRoom.startsWith('private_')) {
                    senderHtml = `<div class="message-sender" style="color: #9ca3af;">${msg.senderUsername}</div>`;
                }
                
                div.innerHTML = senderHtml + msg.text + `<div class="message-time">${formatTime(msg.timestamp)}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendChatMessage = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            await db.ref(`messages/${currentChatRoom}`).push({
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                senderAvatar: currentUserData.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = '';
        };

        window.closeChatRoom = () => {
            if (messagesListener) messagesListener.off();
            if (currentChatRoom !== 'public' && !currentChatRoom.startsWith('private_')) {
                db.ref(`rooms/${currentChatRoom}/usersOnline/${currentUser.uid}`).remove();
            }
            renderMainHome();
        };

        // ========== إنشاء غرفة ==========
        window.showCreateRoomModal = () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="margin-bottom: 10px;">✨ إنشاء غرفة جديدة</h3>
                    <input type="text" id="newRoomName" class="modal-input" placeholder="اسم الغرفة">
                    <div class="modal-buttons">
                        <button class="modal-btn confirm" onclick="createNewRoom()">إنشاء</button>
                        <button class="modal-btn cancel" onclick="this.closest('.modal').remove()">إلغاء</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.createNewRoom = async () => {
            const name = document.getElementById('newRoomName').value.trim();
            if (!name) return showToast('❌ الرجاء إدخال اسم الغرفة');
            
            const roomId = db.ref('rooms').push().key;
            await db.ref(`rooms/${roomId}`).set({
                id: roomId, name: name, image: '🏠', ownerId: currentUser.uid,
                admins: [currentUser.uid], bannedUsers: {},
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            document.querySelector('.modal').remove();
            showToast('✅ تم إنشاء الغرفة بنجاح');
            renderMainHome();
        };

        // ========== صفحة الملف الشخصي ==========
        async function renderProfilePage() {
            const friendsCount = currentUserData.friends ? Object.keys(currentUserData.friends).length : 0;
            const xpPercent = (currentUserData.xp % 1000) / 10;
            
            document.getElementById('app').innerHTML = `
                <div class="app-container">
                    <div class="app-header">
                        <button class="back-btn" onclick="renderMainHome()" style="background: none; border: none; color: white; font-size: 24px;"><i class="fas fa-arrow-right"></i></button>
                        <div class="header-title">ملفي الشخصي</div>
                        <div style="width: 40px;"></div>
                    </div>
                    <div class="main-content">
                        <div style="text-align: center; margin-bottom: 25px;">
                            <div style="font-size: 80px;">${currentUserData.avatar}</div>
                            <div style="font-size: 24px; font-weight: 700; margin: 10px 0 5px;">${currentUserData.username}</div>
                            <div style="color: #9ca3af; font-size: 13px;">#${currentUserData.userId}</div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px;">
                            <div class="room-card" style="flex-direction: column; padding: 15px; text-align: center;">
                                <div style="font-size: 24px; font-weight: 700; color: #6366f1;">${currentUserData.level}</div>
                                <div style="font-size: 12px; color: #9ca3af;">المستوى</div>
                            </div>
                            <div class="room-card" style="flex-direction: column; padding: 15px; text-align: center;">
                                <div style="font-size: 24px; font-weight: 700; color: #6366f1;">${currentUserData.xp}</div>
                                <div style="font-size: 12px; color: #9ca3af;">XP</div>
                            </div>
                            <div class="room-card" style="flex-direction: column; padding: 15px; text-align: center;">
                                <div style="font-size: 24px; font-weight: 700; color: #6366f1;">${friendsCount}</div>
                                <div style="font-size: 12px; color: #9ca3af;">أصدقاء</div>
                            </div>
                        </div>
                        <div class="xp-bar" style="background: #1a1a1a; height: 8px; border-radius: 10px; overflow: hidden; margin-bottom: 25px;">
                            <div class="xp-fill" style="width: ${xpPercent}%; height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7);"></div>
                        </div>
                        <div style="margin-bottom: 20px;">
                            ${currentUserData.badges.map(b => `<span class="badge-item" style="display: inline-block; background: #1a1a1a; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin: 4px;"><i class="fas fa-medal" style="color: #f59e0b;"></i> ${b}</span>`).join('')}
                        </div>
                        <div class="friend-card" style="justify-content: space-between;">
                            <span><i class="fas fa-venus-mars"></i> ${currentUserData.gender === 'male' ? 'ذكر' : 'أنثى'}</span>
                        </div>
                        <div class="friend-card" style="justify-content: space-between;">
                            <span><i class="fas fa-map-marker-alt"></i> ${currentUserData.country}</span>
                        </div>
                        <div class="friend-card" style="justify-content: space-between;">
                            <span><i class="fas fa-info-circle"></i> ${currentUserData.bio || 'لا توجد سيرة'}</span>
                        </div>
                        <button onclick="editUserBio()" style="width: 100%; padding: 14px; background: #1a1a1a; border: none; border-radius: 25px; color: white; margin-top: 15px;"><i class="fas fa-edit"></i> تعديل السيرة الذاتية</button>
                        <button onclick="logout()" style="width: 100%; padding: 14px; background: #ef4444; border: none; border-radius: 25px; color: white; margin-top: 10px;"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                    </div>
                </div>
            `;
        }

        window.editUserBio = () => {
            const newBio = prompt('السيرة الذاتية الجديدة:', currentUserData.bio || '');
            if (newBio !== null) {
                db.ref(`users/${currentUser.uid}`).update({ bio: newBio });
                currentUserData.bio = newBio;
                renderProfilePage();
                showToast('✅ تم تحديث السيرة الذاتية');
            }
        };

        window.logout = async () => {
            await db.ref(`users/${currentUser.uid}`).update({ online: false });
            await auth.signOut();
            renderAuth();
        };

        // ========== مراقبة حالة المستخدم ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const snap = await db.ref(`users/${user.uid}`).once('value');
                if (!snap.exists() || !snap.val().profileCompleted) {
                    renderCompleteProfile();
                } else {
                    currentUserData = snap.val();
                    renderMainHome();
                }
            } else {
                renderAuth();
            }
        });

        // إنشاء حساب الأدمن تلقائياً
        setTimeout(async () => {
            try {
                await auth.createUserWithEmailAndPassword('admin@chatksa.com', 'Admin@123456');
            } catch(e) {}
        }, 2000);
    </script>
</body>
</html>
