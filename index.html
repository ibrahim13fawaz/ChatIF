<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مجلس - منصة تواصل اجتماعي</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #0f0f0f;
            --card: #1a1a1a;
            --card-light: #222222;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --vip: #fbbf24;
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --border: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* شاشات المصادقة */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-card {
            background: var(--card);
            border-radius: 40px;
            padding: 35px 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .auth-card i {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .auth-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 15px;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        /* التطبيق الرئيسي */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
        }

        /* رأس التطبيق */
        .app-header {
            padding: 15px 20px;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-id {
            font-size: 11px;
            background: var(--card);
            padding: 5px 10px;
            border-radius: 20px;
            color: var(--text-secondary);
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* الشريط السفلي */
        .bottom-nav {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 8px 20px;
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
        }

        /* ========== الصفحة الرئيسية ========== */
        .hero-section {
            background: linear-gradient(135deg, var(--card), var(--surface));
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .hero-avatar {
            font-size: 65px;
            margin-bottom: 10px;
        }

        .hero-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
        }

        .hero-stat {
            text-align: center;
        }

        .hero-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .hero-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* بطاقات القسم */
        .section-card {
            background: var(--card);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--primary);
        }

        /* قائمة المرحلين / الأصدقاء */
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-avatar {
            font-size: 45px;
        }

        .list-info {
            flex: 1;
        }

        .list-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .list-status {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .list-badge {
            background: var(--primary-dark);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        /* الأصدقاء */
        .friend-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card-light);
            border-radius: 18px;
            margin-bottom: 10px;
        }

        .friend-avatar {
            font-size: 45px;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .friend-id {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .friend-status {
            font-size: 11px;
            color: var(--success);
        }

        .friend-actions {
            display: flex;
            gap: 8px;
        }

        .friend-btn {
            background: var(--surface);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
        }

        /* الإنجازات */
        .badge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge-item {
            background: var(--card-light);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-item i {
            color: var(--warning);
        }

        /* شاشة الدردشة */
        .chat-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
        }

        .chat-room-name {
            flex: 1;
            font-weight: 700;
            font-size: 18px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-left {
            align-self: flex-start;
            background: var(--card);
            border-bottom-left-radius: 5px;
        }

        .message-right {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 5px;
        }

        .message-sender {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 9px;
            margin-top: 4px;
            text-align: right;
            opacity: 0.7;
        }

        .input-area {
            padding: 12px 15px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--card);
            border: none;
            border-radius: 25px;
            color: var(--text);
            font-size: 15px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        /* نافذة إنشاء غرفة */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: var(--card);
            border-radius: 30px;
            padding: 25px;
            width: 85%;
            max-width: 320px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            margin: 15px 0;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 4000;
            animation: fadeUp 0.3s;
            font-size: 13px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1x9fJe6zPFo7yiK1kSRsoR89aSff5k",
            authDomain: "itchat-web-8c4ed.firebaseapp.com",
            databaseURL: "https://itchat-web-8c4ed-default-rtdb.firebaseio.com",
            projectId: "itchat-web-8c4ed",
            storageBucket: "itchat-web-8c4ed.firebasestorage.app",
            messagingSenderId: "787261764804",
            appId: "1:787261764804:web:7af9a924d03989b1dbc591"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentUserData = null;
        let currentChatRoom = null;
        let messagesListener = null;

        // دوال مساعدة
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function generateUserId() {
            return Math.floor(100000000 + Math.random() * 900000000).toString();
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
        }

        // واجهات المصادقة
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <i class="fas fa-comments"></i>
                        <h1>مجلس</h1>
                        <p style="color:#9ca3af; margin-bottom:25px;">مجتمع تواصل اجتماعي</p>
                        <div id="loginForm">
                            <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني">
                            <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور">
                            <button onclick="handleLogin()" class="auth-btn">دخول</button>
                            <button onclick="showRegisterForm()" class="auth-btn" style="background:#1a1a1a;">إنشاء حساب</button>
                        </div>
                        <div id="registerForm" style="display:none;">
                            <input type="email" id="regEmail" class="auth-input" placeholder="البريد الإلكتروني">
                            <input type="password" id="regPassword" class="auth-input" placeholder="كلمة المرور">
                            <input type="password" id="regConfirm" class="auth-input" placeholder="تأكيد كلمة المرور">
                            <button onclick="handleRegister()" class="auth-btn">إنشاء حساب</button>
                            <button onclick="showLoginForm()" class="auth-btn" style="background:#1a1a1a;">عودة</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if (!email || !pwd) return showToast('املأ جميع الحقول');
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
            } catch(e) { showToast('بريد أو كلمة مرور غير صحيحة'); }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!email || !pwd) return showToast('املأ جميع الحقول');
            if (pwd !== confirm) return showToast('كلمة المرور غير متطابقة');
            if (pwd.length < 6) return showToast('كلمة المرور 6 أحرف على الأقل');
            try {
                await auth.createUserWithEmailAndPassword(email, pwd);
            } catch(e) { showToast('البريد الإلكتروني مستخدم'); }
        };

        window.showRegisterForm = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        window.showLoginForm = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };

        // إكمال الملف الشخصي
        function renderCompleteProfile() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <i class="fas fa-user-astronaut"></i>
                        <h1>مرحباً بك!</h1>
                        <p style="color:#9ca3af; margin-bottom:20px;">أكمل بياناتك للبدء</p>
                        <div style="display:flex; justify-content:center; gap:25px; margin-bottom:20px;">
                            <div onclick="selectGender('male')" id="maleBox" style="padding:10px 20px; border-radius:20px; cursor:pointer; border:2px solid transparent;">
                                <i class="fas fa-user" style="font-size:30px;"></i><div>ذكر</div>
                            </div>
                            <div onclick="selectGender('female')" id="femaleBox" style="padding:10px 20px; border-radius:20px; cursor:pointer; border:2px solid transparent;">
                                <i class="fas fa-user" style="font-size:30px;"></i><div>أنثى</div>
                            </div>
                        </div>
                        <input type="text" id="username" class="auth-input" placeholder="اسم المستخدم">
                        <button onclick="completeProfile()" class="auth-btn">ابدأ</button>
                    </div>
                </div>
            `;
        }

        let selectedGender = null;
        window.selectGender = (g) => {
            selectedGender = g;
            document.getElementById('maleBox').style.borderColor = g === 'male' ? '#6366f1' : 'transparent';
            document.getElementById('femaleBox').style.borderColor = g === 'female' ? '#6366f1' : 'transparent';
        };

        window.completeProfile = async () => {
            const username = document.getElementById('username').value.trim();
            if (!selectedGender) return showToast('اختر الجنس');
            if (!username) return showToast('أدخل اسم المستخدم');
            if (username.length < 3) return showToast('اسم المستخدم 3 أحرف على الأقل');
            
            const avatar = selectedGender === 'male' ? '👨' : '👩';
            const userId = generateUserId();
            await db.ref(`users/${currentUser.uid}`).set({
                uid: currentUser.uid, username, avatar, gender: selectedGender,
                userId: userId, level: 1, xp: 0, coins: 100,
                online: true, friends: {}, requests: {}, 
                badges: ['🆕 عضو جديد', '🌟 مبتدئ'],
                profileCompleted: true, bio: 'مرحباً! أنا عضو جديد في مجلس',
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            currentUserData = (await db.ref(`users/${currentUser.uid}`).once('value')).val();
            renderMainApp();
        };

        // التطبيق الرئيسي
        function renderMainApp() {
            document.getElementById('app').innerHTML = `
                <div class="app-container">
                    <div class="app-header">
                        <div class="header-logo"><i class="fas fa-crown" style="color:#f59e0b;"></i> مجلس</div>
                        <div class="header-id">🆔 ${currentUserData.userId}</div>
                    </div>
                    <div class="main-content" id="mainContent"></div>
                    <div class="bottom-nav">
                        <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>الرئيسية</span></button>
                        <button class="nav-item" data-page="friends"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></button>
                        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>البروفايل</span></button>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const page = btn.dataset.page;
                    if (page === 'home') renderHomePage();
                    else if (page === 'friends') renderFriendsPage();
                    else renderProfilePage();
                });
            });
            renderHomePage();
        }

        // ========== الصفحة الرئيسية ==========
        async function renderHomePage() {
            const container = document.getElementById('mainContent');
            const onlineSnap = await db.ref('users').once('value');
            const onlineCount = Object.values(onlineSnap.val() || {}).filter(u => u.online).length;
            
            // جلب قائمة المرحلين (أكثر المستخدمين نشاطاً - تجريبي)
            const usersSnap = await db.ref('users').once('value');
            const topUsers = [];
            for (const [uid, user] of Object.entries(usersSnap.val() || {})) {
                if (uid !== currentUser.uid) {
                    topUsers.push({uid, ...user});
                }
            }
            const top3 = topUsers.slice(0, 5);
            
            // جلب الأصدقاء
            const friends = currentUserData.friends || {};
            const friendsList = [];
            for (const fid of Object.keys(friends)) {
                const userSnap = await db.ref(`users/${fid}`).once('value');
                const user = userSnap.val();
                if (user) friendsList.push(user);
            }
            
            container.innerHTML = `
                <!-- القسم الترحيبي -->
                <div class="hero-section">
                    <div class="hero-avatar">${currentUserData.avatar}</div>
                    <div class="hero-name">${currentUserData.username}</div>
                    <div class="hero-stats">
                        <div class="hero-stat"><div class="hero-stat-value">${currentUserData.level}</div><div class="hero-stat-label">المستوى</div></div>
                        <div class="hero-stat"><div class="hero-stat-value">${currentUserData.coins || 0}</div><div class="hero-stat-label">💎 عملة</div></div>
                        <div class="hero-stat"><div class="hero-stat-value">${onlineCount}</div><div class="hero-stat-label">🟢 متصل</div></div>
                    </div>
                </div>
                
                <!-- المرحلين (أكثر المستخدمين نشاطاً) -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-trophy"></i> المرحلين</div>
                    ${top3.slice(0, 4).map(user => `
                        <div class="list-item">
                            <div class="list-avatar">${user.avatar}</div>
                            <div class="list-info">
                                <div class="list-name">${user.username}</div>
                                <div class="list-status">مستوى ${user.level} • ${user.online ? '🟢 متصل' : '⚫ غير متصل'}</div>
                            </div>
                            <div class="list-badge"><i class="fas fa-star"></i> #${top3.indexOf(user) + 1}</div>
                        </div>
                    `).join('')}
                    ${top3.length === 0 ? '<div class="empty-state">لا يوجد مرحلين بعد</div>' : ''}
                </div>
                
                <!-- الأصدقاء -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-user-friends"></i> الأصدقاء</div>
                    ${friendsList.slice(0, 4).map(friend => `
                        <div class="list-item">
                            <div class="list-avatar">${friend.avatar}</div>
                            <div class="list-info">
                                <div class="list-name">${friend.username}</div>
                                <div class="list-status">${friend.online ? '🟢 متصل الآن' : '⚫ غير متصل'}</div>
                            </div>
                            <button class="friend-btn" onclick="openChatRoom('private_${friend.uid}', '${friend.username}')" style="padding:5px 12px;">💬</button>
                        </div>
                    `).join('')}
                    ${friendsList.length === 0 ? '<div class="empty-state">لا يوجد أصدقاء بعد</div>' : ''}
                    ${friendsList.length > 4 ? `<div style="text-align:center; margin-top:10px;"><button class="friend-btn" onclick="document.querySelector('[data-page=\'friends\']').click()">عرض الكل +${friendsList.length - 4}</button></div>` : ''}
                </div>
                
                <!-- الإنجازات -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-medal"></i> الإنجازات</div>
                    <div class="badge-grid">
                        ${currentUserData.badges.map(badge => `
                            <div class="badge-item"><i class="fas fa-award"></i> ${badge}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // ========== صفحة الأصدقاء ==========
        async function renderFriendsPage() {
            const container = document.getElementById('mainContent');
            const friends = currentUserData.friends || {};
            const requestsSnap = await db.ref(`users/${currentUser.uid}/requests`).once('value');
            const requests = requestsSnap.val() || {};
            
            // جلب بيانات الأصدقاء
            const friendsList = [];
            for (const fid of Object.keys(friends)) {
                const userSnap = await db.ref(`users/${fid}`).once('value');
                const user = userSnap.val();
                if (user) friendsList.push(user);
            }
            
            // جلب بيانات الطلبات
            const requestsList = [];
            for (const [uid, req] of Object.entries(requests)) {
                const userSnap = await db.ref(`users/${uid}`).once('value');
                const user = userSnap.val();
                if (user) requestsList.push({uid, ...user});
            }
            
            container.innerHTML = `
                <!-- إضافة صديق -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-user-plus"></i> إضافة صديق</div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="friendIdInput" class="message-input" style="flex:1;" placeholder="أدخل ID المستخدم">
                        <button class="friend-btn" onclick="addFriendById()" style="background:var(--primary);">إضافة</button>
                    </div>
                </div>
                
                <!-- طلبات الصداقة -->
                ${requestsList.length > 0 ? `
                    <div class="section-card">
                        <div class="section-title"><i class="fas fa-bell"></i> طلبات الصداقة (${requestsList.length})</div>
                        ${requestsList.map(req => `
                            <div class="friend-card">
                                <div class="friend-avatar">${req.avatar}</div>
                                <div class="friend-info">
                                    <div class="friend-name">${req.username}</div>
                                    <div class="friend-id">🆔 ${req.userId}</div>
                                </div>
                                <div class="friend-actions">
                                    <button class="friend-btn" onclick="acceptFriendRequest('${req.uid}')" style="background:var(--success);">قبول</button>
                                    <button class="friend-btn" onclick="rejectFriendRequest('${req.uid}')" style="background:var(--danger);">رفض</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                <!-- قائمة الأصدقاء -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-user-friends"></i> أصدقائي (${friendsList.length})</div>
                    ${friendsList.length === 0 ? '<div class="empty-state">لا يوجد أصدقاء بعد</div>' : friendsList.map(friend => `
                        <div class="friend-card">
                            <div class="friend-avatar">${friend.avatar}</div>
                            <div class="friend-info">
                                <div class="friend-name">${friend.username}</div>
                                <div class="friend-id">🆔 ${friend.userId}</div>
                                <div class="friend-status">${friend.online ? '🟢 متصل الآن' : '⚫ غير متصل'}</div>
                            </div>
                            <div class="friend-actions">
                                <button class="friend-btn" onclick="openChatRoom('private_${friend.uid}', '${friend.username}')">💬 دردشة</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.addFriendById = async () => {
            const friendId = document.getElementById('friendIdInput').value.trim();
            if (!friendId) return showToast('أدخل ID المستخدم');
            
            const usersSnap = await db.ref('users').once('value');
            let foundUid = null;
            for (const [uid, user] of Object.entries(usersSnap.val() || {})) {
                if (user.userId === friendId && uid !== currentUser.uid) {
                    foundUid = uid;
                    break;
                }
            }
            if (!foundUid) return showToast('لا يوجد مستخدم بهذا ID');
            
            const existingFriend = await db.ref(`users/${currentUser.uid}/friends/${foundUid}`).once('value');
            if (existingFriend.exists()) return showToast('هذا المستخدم صديقك بالفعل');
            
            await db.ref(`users/${foundUid}/requests/${currentUser.uid}`).set({
                fromUserId: currentUser.uid,
                fromUsername: currentUserData.username,
                fromAvatar: currentUserData.avatar,
                fromId: currentUserData.userId,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            showToast('تم إرسال طلب الصداقة');
            document.getElementById('friendIdInput').value = '';
        };

        window.acceptFriendRequest = async (fromUid) => {
            const userSnap = await db.ref(`users/${fromUid}`).once('value');
            const user = userSnap.val();
            
            await db.ref(`users/${currentUser.uid}/friends/${fromUid}`).set({
                userId: fromUid, username: user.username, avatar: user.avatar,
                addedAt: firebase.database.ServerValue.TIMESTAMP
            });
            await db.ref(`users/${fromUid}/friends/${currentUser.uid}`).set({
                userId: currentUser.uid, username: currentUserData.username, avatar: currentUserData.avatar,
                addedAt: firebase.database.ServerValue.TIMESTAMP
            });
            await db.ref(`users/${currentUser.uid}/requests/${fromUid}`).remove();
            showToast('تم قبول طلب الصداقة');
            renderFriendsPage();
        };

        window.rejectFriendRequest = async (fromUid) => {
            await db.ref(`users/${currentUser.uid}/requests/${fromUid}`).remove();
            showToast('تم رفض الطلب');
            renderFriendsPage();
        };

        // ========== صفحة البروفايل ==========
        async function renderProfilePage() {
            const container = document.getElementById('mainContent');
            const friendsCount = Object.keys(currentUserData.friends || {}).length;
            const xpPercent = (currentUserData.xp % 1000) / 10;
            
            container.innerHTML = `
                <div style="text-align:center; margin-bottom:20px;">
                    <div style="font-size:80px;">${currentUserData.avatar}</div>
                    <div style="font-size:24px; font-weight:700;">${currentUserData.username}</div>
                    <div style="color:#9ca3af; font-size:13px;">🆔 ${currentUserData.userId}</div>
                </div>
                
                <!-- الإحصائيات -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-chart-line"></i> الإحصائيات</div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; text-align:center;">
                        <div><div style="font-size:22px; font-weight:700; color:var(--primary);">${currentUserData.level}</div><div style="font-size:12px; color:var(--text-secondary);">المستوى</div></div>
                        <div><div style="font-size:22px; font-weight:700; color:var(--primary);">${currentUserData.xp || 0}</div><div style="font-size:12px; color:var(--text-secondary);">XP</div></div>
                        <div><div style="font-size:22px; font-weight:700; color:var(--primary);">${friendsCount}</div><div style="font-size:12px; color:var(--text-secondary);">أصدقاء</div></div>
                    </div>
                    <div style="margin-top:15px;">
                        <div style="background:var(--card-light); height:8px; border-radius:10px; overflow:hidden;">
                            <div style="width:${xpPercent}%; height:100%; background:linear-gradient(90deg, var(--primary), #a855f7);"></div>
                        </div>
                        <div style="font-size:11px; color:var(--text-secondary); margin-top:5px;">${1000 - (currentUserData.xp % 1000)} XP للوصول للمستوى التالي</div>
                    </div>
                </div>
                
                <!-- الشارات والإنجازات -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-medal"></i> الشارات والإنجازات</div>
                    <div class="badge-grid">
                        ${currentUserData.badges.map(badge => `
                            <div class="badge-item"><i class="fas fa-award"></i> ${badge}</div>
                        `).join('')}
                    </div>
                </div>
                
                <!-- المعلومات الشخصية -->
                <div class="section-card">
                    <div class="section-title"><i class="fas fa-info-circle"></i> المعلومات</div>
                    <div style="display:flex; justify-content:space-between; padding:8px 0;">
                        <span><i class="fas fa-venus-mars"></i> الجنس</span>
                        <span>${currentUserData.gender === 'male' ? 'ذكر' : 'أنثى'}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:8px 0;">
                        <span><i class="fas fa-calendar"></i> تاريخ الانضمام</span>
                        <span>${new Date(currentUserData.createdAt).toLocaleDateString('ar')}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:8px 0;">
                        <span><i class="fas fa-comment"></i> السيرة</span>
                        <span>${currentUserData.bio || 'مرحباً! أنا عضو جديد'}</span>
                    </div>
                </div>
                
                <button onclick="logout()" style="width:100%; padding:14px; background:var(--danger); border:none; border-radius:25px; color:white; margin-top:10px;"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
            `;
        }

        // ========== شاشة الدردشة ==========
        window.openChatRoom = async (roomId, roomName) => {
            if (messagesListener) messagesListener.off();
            currentChatRoom = roomId;
            
            document.getElementById('app').innerHTML = `
                <div class="chat-screen">
                    <div class="chat-header">
                        <button class="back-btn" onclick="closeChatRoom()"><i class="fas fa-arrow-right"></i></button>
                        <div class="chat-room-name">${roomName}</div>
                    </div>
                    <div class="messages-area" id="messagesArea"></div>
                    <div class="input-area">
                        <input type="text" id="msgInput" class="message-input" placeholder="اكتب رسالتك...">
                        <button class="send-btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            `;
            
            loadChatMessages();
        };

        function loadChatMessages() {
            const ref = db.ref(`messages/${currentChatRoom}`);
            const container = document.getElementById('messagesArea');
            if (!container) return;
            container.innerHTML = '';
            
            messagesListener = ref.orderByChild('timestamp').limitToLast(100).on('child_added', (snap) => {
                const msg = snap.val();
                const isOwn = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message-bubble ${isOwn ? 'message-right' : 'message-left'}`;
                
                let senderHtml = '';
                if (!isOwn && !currentChatRoom.startsWith('private_')) {
                    senderHtml = `<div class="message-sender">${msg.senderUsername}</div>`;
                }
                div.innerHTML = senderHtml + msg.text + `<div class="message-time">${formatTime(msg.timestamp)}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendChatMessage = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            await db.ref(`messages/${currentChatRoom}`).push({
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                senderAvatar: currentUserData.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = '';
        };

        window.closeChatRoom = () => {
            if (messagesListener) messagesListener.off();
            renderMainApp();
        };

        window.logout = async () => {
            await db.ref(`users/${currentUser.uid}`).update({ online: false });
            await auth.signOut();
            renderAuth();
        };

        // مراقبة المستخدم
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const snap = await db.ref(`users/${user.uid}`).once('value');
                if (!snap.exists() || !snap.val().profileCompleted) {
                    renderCompleteProfile();
                } else {
                    currentUserData = snap.val();
                    await db.ref(`users/${user.uid}`).update({ online: true });
                    renderMainApp();
                }
            } else {
                renderAuth();
            }
        });

        // إنشاء حساب أدمن تلقائي
        setTimeout(async () => {
            try {
                await auth.createUserWithEmailAndPassword('admin@chatksa.com', 'Admin@123456');
                console.log('Admin ready');
            } catch(e) {}
        }, 2000);
    </script>
</body>
</html>
