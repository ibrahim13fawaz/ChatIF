<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دردشة اجتماعي - التطبيق الرسمي</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --border: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* شاشات المصادقة */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 40px 25px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header i {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .auth-header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* التطبيق الرئيسي */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }

        /* شريط الحالة */
        .status-bar {
            padding: 12px 20px;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        /* رأس التطبيق */
        .app-header {
            padding: 15px 20px;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* شريط التنقل السفلي */
        .bottom-nav {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .nav-item i {
            font-size: 24px;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* صفحة الدردشة */
        .chat-room-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .back-btn {
            background: var(--bg-card);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            font-size: 18px;
            font-weight: 700;
        }

        .room-status {
            font-size: 12px;
            color: var(--secondary);
        }

        .messages-area {
            height: calc(100vh - 200px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }

        .message-left {
            align-self: flex-start;
            background: var(--bg-card);
            border-bottom-left-radius: 5px;
        }

        .message-right {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-bottom-right-radius: 5px;
        }

        .message-sender {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 15px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-card);
            border: none;
            border-radius: 30px;
            color: var(--text);
            font-size: 16px;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* صفحة الأصدقاء */
        .friend-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .friend-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .friend-status {
            font-size: 12px;
            color: var(--secondary);
        }

        /* صفحة الملف الشخصي */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            margin: 0 auto 15px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 25px 0;
        }

        .stat-item {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .xp-bar {
            background: var(--bg-card);
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            width: 0%;
            border-radius: 10px;
        }

        .badge-item {
            display: inline-block;
            background: var(--bg-card);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            margin: 5px;
        }

        /* صفحة الغرف */
        .room-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        /* نافذة إنشاء غرفة */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 320px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            margin: 15px 0;
        }

        /* إشعارات */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2001;
            animation: slideUp 0.3s ease;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCXA1x9fJe6zPFo7yiK1kSRsoR89aSff5k",
            authDomain: "itchat-web-8c4ed.firebaseapp.com",
            databaseURL: "https://itchat-web-8c4ed-default-rtdb.firebaseio.com",
            projectId: "itchat-web-8c4ed",
            storageBucket: "itchat-web-8c4ed.firebasestorage.app",
            messagingSenderId: "787261764804",
            appId: "1:787261764804:web:7af9a924d03989b1dbc591"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentUserData = null;
        let currentRoom = 'public';
        let currentRoomName = 'الغرفة العامة';
        let messagesListener = null;
        let selectedGender = null;

        // دوال مساعدة
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function generateId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function isUsernameUnique(username) {
            const snap = await db.ref('users').orderByChild('username').equalTo(username).once('value');
            return !snap.exists();
        }

        function formatTime(ts) {
            if (!ts) return 'الآن';
            const d = new Date(ts);
            return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
        }

        // واجهة تسجيل الدخول
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <div class="auth-header">
                            <i class="fas fa-comments"></i>
                            <h1>دردشة اجتماعي</h1>
                            <p style="color: #9ca3af; font-size: 14px;">تواصل مع الأصدقاء</p>
                        </div>
                        <div id="loginForm">
                            <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني">
                            <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور">
                            <button onclick="handleLogin()" class="auth-btn">دخول</button>
                            <button onclick="showRegisterForm()" class="auth-btn" style="background: #1a1a1a; margin-top: 10px;">إنشاء حساب</button>
                        </div>
                        <div id="registerForm" style="display: none;">
                            <input type="email" id="regEmail" class="auth-input" placeholder="البريد الإلكتروني">
                            <input type="password" id="regPassword" class="auth-input" placeholder="كلمة المرور">
                            <input type="password" id="regConfirm" class="auth-input" placeholder="تأكيد كلمة المرور">
                            <button onclick="handleRegister()" class="auth-btn">إنشاء حساب</button>
                            <button onclick="showLoginForm()" class="auth-btn" style="background: #1a1a1a; margin-top: 10px;">عودة</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if (!email || !pwd) return showToast('املأ جميع الحقول');
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
            } catch(e) { showToast(e.message); }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pwd = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!email || !pwd) return showToast('املأ جميع الحقول');
            if (pwd !== confirm) return showToast('كلمة المرور غير متطابقة');
            if (pwd.length < 6) return showToast('كلمة المرور 6 أحرف على الأقل');
            try {
                await auth.createUserWithEmailAndPassword(email, pwd);
            } catch(e) { showToast(e.message); }
        };

        window.showRegisterForm = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        window.showLoginForm = () => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        };

        // واجهة إكمال الملف الشخصي
        function renderCompleteProfile() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <div class="auth-header">
                            <i class="fas fa-user-astronaut"></i>
                            <h1>أهلاً بك!</h1>
                            <p style="color: #9ca3af;">أكمل بياناتك</p>
                        </div>
                        <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;">
                            <div onclick="selectGender('male')" id="maleBox" style="text-align: center; padding: 15px; border-radius: 20px; cursor: pointer; border: 2px solid transparent;">
                                <i class="fas fa-user-astronaut" style="font-size: 45px;"></i>
                                <div>ذكر</div>
                            </div>
                            <div onclick="selectGender('female')" id="femaleBox" style="text-align: center; padding: 15px; border-radius: 20px; cursor: pointer; border: 2px solid transparent;">
                                <i class="fas fa-user-ninja" style="font-size: 45px;"></i>
                                <div>أنثى</div>
                            </div>
                        </div>
                        <select id="countrySelect" class="auth-input">
                            <option value="">اختر الدولة</option>
                            <option value="السعودية">🇸🇦 السعودية</option>
                            <option value="مصر">🇪🇬 مصر</option>
                            <option value="الإمارات">🇦🇪 الإمارات</option>
                            <option value="الكويت">🇰🇼 الكويت</option>
                            <option value="قطر">🇶🇦 قطر</option>
                        </select>
                        <input type="text" id="username" class="auth-input" placeholder="اسم المستخدم">
                        <button onclick="completeProfile()" class="auth-btn">ابدأ</button>
                    </div>
                </div>
            `;
        }

        window.selectGender = (g) => {
            selectedGender = g;
            document.getElementById('maleBox').style.borderColor = g === 'male' ? '#6366f1' : 'transparent';
            document.getElementById('femaleBox').style.borderColor = g === 'female' ? '#6366f1' : 'transparent';
        };

        window.completeProfile = async () => {
            const username = document.getElementById('username').value.trim();
            const country = document.getElementById('countrySelect').value;
            if (!selectedGender) return showToast('اختر الجنس');
            if (!country) return showToast('اختر الدولة');
            if (!username) return showToast('أدخل اسم المستخدم');
            if (username.length < 3) return showToast('اسم المستخدم 3 أحرف على الأقل');
            if (!await isUsernameUnique(username)) return showToast('الاسم موجود بالفعل');
            const avatar = selectedGender === 'male' ? '👨' : '👩';
            await db.ref(`users/${currentUser.uid}`).set({
                uid: currentUser.uid,
                username, avatar, gender: selectedGender, country,
                userId: generateId(), level: 0, xp: 0, online: true,
                lastSeen: firebase.database.ServerValue.TIMESTAMP,
                friends: {}, requests: {}, badges: ['🆕 جديد'],
                profileCompleted: true, canChangeUsername: true, bio: '',
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            currentUserData = (await db.ref(`users/${currentUser.uid}`).once('value')).val();
            renderMainApp();
        };

        // التطبيق الرئيسي
        function renderMainApp() {
            document.getElementById('app').innerHTML = `
                <div class="app-container">
                    <div class="status-bar">
                        <span>${new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' })}</span>
                        <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span>
                    </div>
                    <div class="app-header">
                        <div class="header-title" id="headerTitle">الدردشة</div>
                        <div class="header-actions">
                            <button class="icon-btn" id="headerActionBtn" style="display: none;"><i class="fas fa-arrow-right"></i></button>
                        </div>
                    </div>
                    <div class="main-content" id="mainContent"></div>
                    <div class="bottom-nav">
                        <button class="nav-item active" data-page="chat"><i class="fas fa-comment-dots"></i><span>الدردشة</span></button>
                        <button class="nav-item" data-page="rooms"><i class="fas fa-users"></i><span>الغرف</span></button>
                        <button class="nav-item" data-page="friends"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></button>
                        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>ملفي</span></button>
                    </div>
                </div>
            `;
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const page = btn.dataset.page;
                    document.getElementById('headerTitle').innerText = page === 'chat' ? 'الدردشة' : page === 'rooms' ? 'الغرف' : page === 'friends' ? 'الأصدقاء' : 'ملفي';
                    document.getElementById('headerActionBtn').style.display = 'none';
                    if (page === 'chat') renderChatPage();
                    else if (page === 'rooms') renderRoomsPage();
                    else if (page === 'friends') renderFriendsPage();
                    else renderProfilePage();
                });
            });
            renderChatPage();
        }

        function renderChatPage() {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div class="chat-room-header">
                    <button class="back-btn" id="backFromRoom" style="display: none;"><i class="fas fa-arrow-right"></i></button>
                    <div class="room-info">
                        <div class="room-name" id="roomName">${currentRoomName}</div>
                        <div class="room-status" id="roomStatus"><i class="fas fa-circle" style="font-size: 8px; color: #10b981;"></i> متصلون: 0</div>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <input type="text" id="msgInput" class="message-input" placeholder="اكتب رسالة...">
                    <button class="send-btn" onclick="sendPublicMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            `;
            document.getElementById('headerActionBtn').style.display = currentRoom !== 'public' ? 'block' : 'none';
            document.getElementById('headerActionBtn').onclick = leaveRoom;
            document.getElementById('backFromRoom').style.display = currentRoom !== 'public' ? 'block' : 'none';
            document.getElementById('backFromRoom').onclick = leaveRoom;
            loadMessages();
            loadRoomOnlineCount();
        }

        window.leaveRoom = async () => {
            if (currentRoom !== 'public') {
                await db.ref(`rooms/${currentRoom}/usersOnline/${currentUser.uid}`).remove();
                currentRoom = 'public';
                currentRoomName = 'الغرفة العامة';
                renderChatPage();
                showToast('خرجت من الغرفة');
            }
        };

        function loadMessages() {
            if (messagesListener) messagesListener.off();
            const ref = db.ref(`messages/${currentRoom}`);
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            messagesListener = ref.orderByChild('timestamp').limitToLast(100).on('child_added', (snap) => {
                const msg = snap.val();
                const isOwn = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message-bubble ${isOwn ? 'message-right' : 'message-left'}`;
                if (!isOwn && currentRoom === 'public') {
                    div.innerHTML = `<div class="message-sender">${msg.senderUsername}</div>`;
                }
                div.innerHTML += `${msg.text}<div class="message-time">${formatTime(msg.timestamp)}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendPublicMessage = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            await db.ref(`messages/${currentRoom}`).push({
                senderId: currentUser.uid,
                senderUsername: currentUserData.username,
                senderAvatar: currentUserData.avatar,
                text, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = '';
        };

        async function loadRoomOnlineCount() {
            if (currentRoom === 'public') {
                db.ref('users').on('value', (snap) => {
                    const users = snap.val();
                    let online = 0;
                    if (users) online = Object.values(users).filter(u => u.online === true).length;
                    document.getElementById('roomStatus').innerHTML = `<i class="fas fa-circle" style="font-size: 8px; color: #10b981;"></i> متصلون: ${online}`;
                });
            } else {
                db.ref(`rooms/${currentRoom}/usersOnline`).on('value', (snap) => {
                    const count = snap.numChildren();
                    document.getElementById('roomStatus').innerHTML = `<i class="fas fa-circle" style="font-size: 8px; color: #10b981;"></i> متصلون: ${count}`;
                });
            }
        }

        function renderRoomsPage() {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <button onclick="showCreateRoomModal()" style="background: linear-gradient(135deg, #6366f1, #4f46e5); border: none; padding: 15px; border-radius: 25px; color: white; font-size: 16px; margin-bottom: 15px; width: 100%;"><i class="fas fa-plus"></i> إنشاء غرفة جديدة</button>
                <div id="roomsList"></div>
            `;
            db.ref('rooms').on('value', (snap) => {
                const roomsList = document.getElementById('roomsList');
                roomsList.innerHTML = '';
                const rooms = snap.val();
                if (rooms) {
                    Object.values(rooms).forEach(room => {
                        const div = document.createElement('div');
                        div.className = 'room-card';
                        div.innerHTML = `<div style="font-size: 40px;">🏠</div><div style="flex:1"><div style="font-weight: 700;">${room.name}</div><div style="font-size: 12px; color: #9ca3af;">${room.ownerId === currentUser.uid ? '👑 مالك' : ''}</div></div>`;
                        div.onclick = () => joinRoom(room.id, room.name);
                        roomsList.appendChild(div);
                    });
                }
            });
        }

        window.joinRoom = async (roomId, roomName) => {
            const roomSnap = await db.ref(`rooms/${roomId}`).once('value');
            const room = roomSnap.val();
            if (room?.bannedUsers?.[currentUser.uid]) {
                showToast('أنت محظور من هذه الغرفة');
                return;
            }
            if (currentRoom !== 'public') {
                await db.ref(`rooms/${currentRoom}/usersOnline/${currentUser.uid}`).remove();
            }
            currentRoom = roomId;
            currentRoomName = roomName;
            await db.ref(`rooms/${currentRoom}/usersOnline/${currentUser.uid}`).set({ username: currentUserData.username });
            await db.ref(`messages/${currentRoom}`).push({
                senderId: 'system', senderUsername: 'النظام', text: `🚪 دخل: ${currentUserData.username}`, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            if (messagesListener) messagesListener.off();
            document.querySelector('.nav-item[data-page="chat"]').click();
            showToast(`انضممت إلى ${roomName}`);
        };

        window.showCreateRoomModal = () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="margin-bottom: 15px;">إنشاء غرفة</h3>
                    <input type="text" id="newRoomName" class="modal-input" placeholder="اسم الغرفة">
                    <button onclick="createRoom()" class="auth-btn" style="margin-top: 10px;">إنشاء</button>
                    <button onclick="this.closest('.modal').remove()" class="auth-btn" style="background: #1a1a1a; margin-top: 10px;">إلغاء</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.createRoom = async () => {
            const name = document.getElementById('newRoomName').value.trim();
            if (!name) return showToast('أدخل اسم الغرفة');
            const roomId = db.ref('rooms').push().key;
            await db.ref(`rooms/${roomId}`).set({
                id: roomId, name, image: '🏠', ownerId: currentUser.uid,
                admins: [currentUser.uid], bannedUsers: {}, createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            document.querySelector('.modal').remove();
            showToast('تم إنشاء الغرفة');
            renderRoomsPage();
        };

        function renderFriendsPage() {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <input type="text" id="searchUser" class="message-input" placeholder="🔍 بحث عن مستخدم..." style="border-radius: 30px;">
                </div>
                <div id="searchResults"></div>
                <div id="friendsList"></div>
            `;
            const searchInput = document.getElementById('searchUser');
            searchInput.addEventListener('input', () => searchUsers(searchInput.value));
            loadFriendsList();
        }

        async function searchUsers(query) {
            if (!query.trim()) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            const snap = await db.ref('users').orderByChild('username').startAt(query).endAt(query + '\uf8ff').once('value');
            const users = snap.val();
            const container = document.getElementById('searchResults');
            container.innerHTML = '<div style="margin: 10px 0; color: #9ca3af;">نتائج البحث:</div>';
            if (users) {
                for (const [uid, user] of Object.entries(users)) {
                    if (uid !== currentUser.uid) {
                        container.innerHTML += `
                            <div class="friend-card">
                                <div class="friend-avatar" style="font-size: 30px;">${user.avatar}</div>
                                <div class="friend-info"><div class="friend-name">${user.username}</div><div style="font-size: 12px;">${user.country}</div></div>
                                <button onclick="sendFriendRequest('${uid}')" style="background: #6366f1; border: none; padding: 8px 20px; border-radius: 20px; color: white;"><i class="fas fa-user-plus"></i></button>
                            </div>
                        `;
                    }
                }
            }
        }

        window.sendFriendRequest = async (toUid) => {
            const userSnap = await db.ref(`users/${toUid}`).once('value');
            const user = userSnap.val();
            await db.ref(`users/${toUid}/requests/${currentUser.uid}`).set({
                fromUserId: currentUser.uid, fromUsername: currentUserData.username,
                fromAvatar: currentUserData.avatar, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            showToast(`تم إرسال طلب إلى ${user.username}`);
        };

        async function loadFriendsList() {
            const friendsSnap = await db.ref(`users/${currentUser.uid}/friends`).once('value');
            const friends = friendsSnap.val();
            const container = document.getElementById('friendsList');
            container.innerHTML = '<div style="margin: 10px 0; color: #9ca3af;">أصدقائك:</div>';
            if (friends) {
                for (const [fid] of Object.entries(friends)) {
                    const userSnap = await db.ref(`users/${fid}`).once('value');
                    const user = userSnap.val();
                    if (user) {
                        container.innerHTML += `
                            <div class="friend-card">
                                <div class="friend-avatar" style="font-size: 30px;">${user.avatar}</div>
                                <div class="friend-info"><div class="friend-name">${user.username}</div><div style="font-size: 12px; color: #10b981;">${user.online ? '🟢 متصل' : '⚫ غير متصل'}</div></div>
                                <button onclick="startPrivateChat('${fid}', '${user.username}')" style="background: #6366f1; border: none; padding: 8px 20px; border-radius: 20px; color: white;"><i class="fas fa-comment"></i></button>
                            </div>
                        `;
                    }
                }
            } else {
                container.innerHTML += '<div style="text-align: center; padding: 40px; color: #9ca3af;">لا يوجد أصدقاء بعد</div>';
            }
        }

        window.startPrivateChat = (userId, username) => {
            const chatId = [currentUser.uid, userId].sort().join('_');
            currentRoom = chatId;
            currentRoomName = `محادثة مع ${username}`;
            if (messagesListener) messagesListener.off();
            document.querySelector('.nav-item[data-page="chat"]').click();
            showToast(`محادثة خاصة مع ${username}`);
        };

        function renderProfilePage() {
            const container = document.getElementById('mainContent');
            const friendsCount = currentUserData.friends ? Object.keys(currentUserData.friends).length : 0;
            const xpPercent = (currentUserData.xp % 1000) / 10;
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${currentUserData.avatar}</div>
                    <div style="font-size: 22px; font-weight: 700;">${currentUserData.username}</div>
                    <div style="color: #9ca3af; font-size: 12px;">#${currentUserData.userId}</div>
                </div>
                <div class="profile-stats">
                    <div class="stat-item"><div class="stat-number">${currentUserData.level}</div><div>المستوى</div></div>
                    <div class="stat-item"><div class="stat-number">${currentUserData.xp}</div><div>XP</div></div>
                    <div class="stat-item"><div class="stat-number">${friendsCount}</div><div>أصدقاء</div></div>
                </div>
                <div class="xp-bar"><div class="xp-fill" style="width: ${xpPercent}%"></div></div>
                <div style="margin: 20px 0;">
                    ${currentUserData.badges.map(b => `<span class="badge-item"><i class="fas fa-medal" style="color: #f59e0b;"></i> ${b}</span>`).join('')}
                </div>
                <div class="friend-card" style="justify-content: space-between;">
                    <span><i class="fas fa-venus-mars"></i> الجنس: ${currentUserData.gender === 'male' ? 'ذكر' : 'أنثى'}</span>
                </div>
                <div class="friend-card" style="justify-content: space-between;">
                    <span><i class="fas fa-map-marker-alt"></i> الدولة: ${currentUserData.country}</span>
                </div>
                <div class="friend-card" style="justify-content: space-between;">
                    <span><i class="fas fa-info-circle"></i> السيرة: ${currentUserData.bio || 'لا توجد'}</span>
                </div>
                <button onclick="editBio()" style="background: #1a1a1a; border: none; padding: 15px; border-radius: 25px; color: white; margin-top: 20px; width: 100%;"><i class="fas fa-edit"></i> تعديل السيرة</button>
            `;
        }

        window.editBio = () => {
            const newBio = prompt('السيرة الذاتية الجديدة:', currentUserData.bio || '');
            if (newBio !== null) {
                db.ref(`users/${currentUser.uid}`).update({ bio: newBio });
                currentUserData.bio = newBio;
                renderProfilePage();
                showToast('تم تحديث السيرة');
            }
        };

        // مراقبة المستخدم
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const snap = await db.ref(`users/${user.uid}`).once('value');
                if (!snap.exists() || !snap.val().profileCompleted) {
                    renderCompleteProfile();
                } else {
                    currentUserData = snap.val();
                    await db.ref(`users/${user.uid}`).update({ online: true });
                    renderMainApp();
                }
            } else {
                renderAuth();
            }
        });

        // إنشاء حساب الأدمن
        setTimeout(async () => {
            try {
                await auth.createUserWithEmailAndPassword('admin@chatksa.com', 'Admin@123456');
            } catch(e) {}
        }, 1000);
    </script>
</body>
</html>
